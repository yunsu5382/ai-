let streamEl=null,streamBody=null;
window.addEventListener('message',e=>{const msg=e.data;switch(msg.type){
  case 'response':hideLoader();setSending(false);addMsg(msg.value,'ai');break;

  case 'brainInject':showInjectCard(msg.title,msg.relPath);break;
  case 'skillInject':showSkillCard(msg);break;
  case 'allSkillsLoaded':
    if(typeof window._slLoadHandler === 'function') window._slLoadHandler(msg);
    break;
  case 'onboardingState':{
    onboardingState = msg;
    if (!msg.dismissed) renderOnboarding();
    break;
  }
  case 'ideModelsProbed':{
    /* Diagnostic: tell user what host-IDE models are reachable via vscode.lm.
       Logged to console + a one-time inline notice if any external model exists. */
    try {
      console.log('[Connect AI] vscode.lm probe — models:', msg.models, 'error:', msg.error);
      if (msg.error) {
        console.log('[Connect AI] IDE 모델 probe 실패:', msg.error);
      } else if (Array.isArray(msg.models) && msg.models.length > 0) {
        const summary = msg.models.map(m => '• ' + (m.vendor||'?') + ' / ' + (m.family||'?') + ' (' + m.id + ')').join('\n');
        const el = document.createElement('div'); el.className='msg';
        el.innerHTML = '<div class="msg-body" style="color:#22D3EE;font-size:12px;line-height:1.6;background:rgba(34,211,238,.05);border:1px solid rgba(34,211,238,.3);padding:10px 12px;border-radius:8px"><strong>🌐 IDE가 익스텐션에 노출하는 모델 ' + msg.models.length + '개:</strong><br>' + summary.replace(/\n/g, '<br>') + '<br><br><span style="color:var(--text-dim);font-size:11px">→ 통합하면 Gemini/Claude 등 호스트 모델을 모델 드롭다운에 추가할 수 있습니다 (개발자에게 요청 필요)</span></div>';
        chat.appendChild(el); scrollChatToBottomIfNear();
      } else {
        console.log('[Connect AI] IDE 모델 probe — 노출되는 모델 없음. Antigravity가 vscode.lm으로 모델을 안 열어주는 것으로 추정.');
      }
    } catch {}
    break;
  }
  case 'engineDetected':{
    if (onboardingState) {
      onboardingState.steps.engine.done = !!msg.engine && !!msg.model;
      onboardingState.steps.engine.detected = msg.engine || '';
      onboardingState.steps.engine.model = msg.model || '';
      if (onboardingState.steps.engine.done) onboardingStep = 2;
      renderOnboarding();
    }
    break;
  }
  case 'brainFolderPicked':{
    if (onboardingState) {
      onboardingState.steps.brain.done = !!msg.path;
      onboardingState.steps.brain.path = msg.path || '';
      if (onboardingState.steps.brain.done) onboardingStep = 3;
      renderOnboarding();
    }
    break;
  }
  case 'githubRepoResult':{
    const r = document.getElementById('ob-repo-result');
    if (r) {
      if (msg.ok) {
        r.innerHTML = '<div class="onboard-result">✅ 저장됨'+(msg.url?': <code>'+msg.url+'</code>':' (빈 값으로 클리어)')+'</div>';
        if (onboardingState) {
          onboardingState.steps.github.done = !!msg.url;
          onboardingState.steps.github.url = msg.url || '';
          setTimeout(() => { onboardingStep = 4; renderOnboarding(); }, 700);
        }
      } else {
        r.innerHTML = '<div class="onboard-result error">⚠️ '+msg.error+'</div>';
      }
    }
    break;
  }
  case 'officeStateChanged':{
    officeOpen=!!msg.open;
    /* Tie corp mode visual to office state — closing the office turns the button OFF visually too */
    corporateMode=officeOpen;
    /* Keep extension's sidebar-broadcast gate in sync with the office toggle.
       Otherwise opening/closing the office leaves _sidebarCorpModeOn stale. */
    try{vscode.postMessage({type:'corpModeToggle',on:officeOpen});}catch{}
    document.body.classList.toggle('office-open',officeOpen);
    document.body.classList.toggle('corp-on',officeOpen);
    if(corporateBtn){
      corporateBtn.style.opacity=officeOpen?'1':'0.5';
      /* 골드 럭셔리 톤 통일 (1인 기업) */
      corporateBtn.style.background=officeOpen?'linear-gradient(135deg,#FBBF24,#F59E0B)':'';
      corporateBtn.title=officeOpen?'AI 1인 기업 모드 (Solo Mode) — 사무실 열림 (클릭해서 닫기)':'AI 1인 기업 모드 (Solo Mode) — OFF (클릭해서 사무실 열기)';
    }
    if(input)input.placeholder=officeOpen?'한 줄 명령을 내리세요. 팀이 알아서 일합니다.':'무엇을 만들어 드릴까요?';
    break;
  }
  case 'error':hideLoader();setSending(false);addMsg(msg.value,'error');break;
  case 'streamStart':{
    /* v2.89.101 — 로더 hide를 streamStart에서 빼고 첫 streamChunk 도착 시점으로 옮김.
       streamStart는 LLM이 응답 시작하기 전(POST 직후)에 미리 와서, 여기서 hide하면
       사용자는 로더가 0.1초만 깜빡이고 사라지는 걸 봄. 진짜 긴 구간(모델 warmup,
       reasoning)은 첫 토큰까지 — 그래서 첫 토큰 도착할 때까지 로더 유지. */
    streamEl=document.createElement('div');streamEl.className='msg';
    const h=document.createElement('div');h.className='msg-head';
    h.innerHTML='<div class="av av-ai">✦</div><span>Connect AI</span><span class="msg-time">'+getTime()+'</span>';
    streamBody=document.createElement('div');streamBody.className='msg-body stream-active';
    streamEl.appendChild(h);streamEl.appendChild(streamBody);chat.appendChild(streamEl);
    /* streamEl을 미리 만들어두지만 첫 청크 전엔 숨겨둠 — 빈 메시지 박스가 로더 위/아래에
       어색하게 떠 있는 걸 방지. */
    streamEl.style.display='none';
    scrollChatToBottomIfNear();
    break;}
  case 'streamChunk':{
    /* v2.89.55 — 스트리밍 중엔 fmt() 호출하지 않음. 부분 markdown ('## ti'까지만 도착하면)
       fmt이 평문으로 처리하고, 다음 청크에서 ('## title' 완성) 다시 호출시 헤딩 변환 →
       사용자는 평문 → 헤딩 점프 봄. 더 심각한 건 코드블록·표 placeholder가 청크별 인덱스
       어긋나서 깨짐. 해법: 스트리밍 중엔 plain text만 누적·표시, streamEnd에서 한 번에 fmt(). */
    if(streamBody){
      /* v2.89.101 — 첫 청크 도착 시 로더 정리 + 메시지 박스 노출 */
      if(!streamBody._raw){
        hideLoader();
        if(streamEl) streamEl.style.display='';
      }
      streamBody._raw=(streamBody._raw||'')+msg.value;
      const safe = streamBody._raw.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
      streamBody.innerHTML = safe.replace(/\n/g, '<br/>');
      scrollChatToBottomIfNear();
    }
    break;}
  case 'streamEnd':{
    /* v2.89.101 — 청크가 한 개도 안 와도 로더 정리 (빈 응답·즉시 종료 케이스) */
    hideLoader();
    if(streamEl && streamEl.style.display==='none') streamEl.style.display='';
    if(streamBody){
      /* 스트리밍 끝났으니 전체 누적 raw에 한 번에 fmt() 적용 → 헤딩·표·인용·리스트 정상 렌더 */
      streamBody.innerHTML = fmt(streamBody._raw||'');
      streamBody.classList.remove('stream-active');
    }
    /* Add regenerate button */
    if(streamEl){
      const rb=document.createElement('button');rb.className='regen-btn';rb.innerHTML='<span style="font-size:13px;line-height:1">↻</span> 재생성';
      rb.addEventListener('click',()=>{rb.remove();vscode.postMessage({type:'regenerate'});showLoader();setSending(true);});
      streamEl.appendChild(rb);
    }
    setSending(false);streamEl=null;streamBody=null;
    break;}
  case 'modelsList':modelSel.innerHTML='';msg.value.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;modelSel.appendChild(o)});break;
  /* v2.89.116 — specialist dock 데이터. corporate 모드 진입 시 +
     dashboard에서 매핑 변경 broadcast 시 양쪽 갱신 */
  case 'agentDockData': renderAgentDock(msg); break;
  case 'agentDockSaved':
    if (msg.ok) {
      /* 저장 성공 — 즉시 dock 재로드해서 항상 진실과 일치 */
      vscode.postMessage({type:'loadAgentDock'});
    } else if (msg.error) {
      try { showAdToast('⚠️ 저장 실패: ' + msg.error); } catch {}
    }
    break;
  case 'agentDockAutoMapped':
    if (msg.ok) {
      try { showAdToast('⚡ 자동 매핑 완료 — ' + Object.keys(msg.map||{}).length + '명 specialist'); } catch {}
      vscode.postMessage({type:'loadAgentDock'});
    } else if (msg.error) {
      try { showAdToast('⚠️ 자동 매핑 실패: ' + msg.error); } catch {}
    }
    break;
  case 'agentMapExternallyChanged':
    /* dashboard "모델 오케스트레이션" 모달에서 변경됐을 때 — corp 모드 켜져
       있으면 즉시 재로드, 꺼져있으면 다음 ON 시 자연스럽게 갱신됨. */
    if (corporateMode) {
      vscode.postMessage({type:'loadAgentDock'});
    }
    break;
  case 'thinkingModeState':
    thinkingModeOn = !!msg.value;
    thinkingBtn.style.opacity = thinkingModeOn ? '1' : '0.5';
    thinkingBtn.style.background = thinkingModeOn ? 'linear-gradient(135deg,var(--accent),var(--accent2))' : '';
    thinkingBtn.title = thinkingModeOn ? 'Thinking Mode: ON (클릭으로 끄기)' : 'Thinking Mode — AI가 어떻게 생각하는지 시각화';
    break;
  case 'statusUpdate':
    updateStatus(msg.value);
    break;
  case 'attachCitations': {
    // Find the most recent AI message and append citation chips
    const msgs = chat.querySelectorAll('.msg');
    const last = msgs[msgs.length-1];
    if (last && msg.sources && msg.sources.length > 0) {
      const wrap = document.createElement('div');
      wrap.className = 'citations';
      wrap.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;margin-left:29px;font-size:11px;color:var(--text-dim);align-items:center';
      const label = document.createElement('span');
      label.textContent = '📚 출처:';
      label.style.cssText = 'opacity:0.7';
      wrap.appendChild(label);
      msg.sources.forEach(src => {
        const chip = document.createElement('button');
        chip.textContent = src.length > 28 ? src.slice(0, 26) + '…' : src;
        chip.title = src;
        chip.style.cssText = 'background:rgba(0,255,102,0.08);border:1px solid rgba(0,255,102,0.25);color:var(--accent);padding:3px 10px;border-radius:12px;font-size:10px;cursor:pointer;font-family:inherit;transition:all 0.2s';
        chip.onmouseover = () => { chip.style.background='rgba(0,255,102,0.18)'; chip.style.transform='translateY(-1px)'; };
        chip.onmouseout = () => { chip.style.background='rgba(0,255,102,0.08)'; chip.style.transform='translateY(0)'; };
        chip.onclick = () => vscode.postMessage({ type: 'highlightBrainNote', note: src });
        wrap.appendChild(chip);
      });
      last.appendChild(wrap);
      scrollChatToBottomIfNear();
    }
    break;
  }
  case 'clearChat':
    document.body.classList.add('init');
    chat.innerHTML=welcomeHtml();
    break;
  case 'restoreMessages':
    chat.innerHTML='';
    if(msg.value&&msg.value.length>0){
      document.body.classList.remove('init');
      msg.value.forEach(m=>addMsg(m.text,m.role));
    } else {
      document.body.classList.add('init');
      chat.innerHTML=welcomeHtml();
    }
    break;
  case 'focusInput':input.focus();break;
  case 'injectPrompt':input.value=msg.value;input.style.height='auto';input.style.height=Math.min(input.scrollHeight,150)+'px';send({bypassCorporate:true});break;
  case 'systemNote':{
    /* Display-only note in chat — no LLM call. Used for Telegram mirroring,
       calendar updates, agent status, etc. The 🌅 icon (daily briefing)
       gets a special sunrise gradient to make it feel like a real morning
       greeting from your secretary. */
    const note=document.createElement('div');note.className='msg';
    const ico=msg.icon||'📱';
    const isBriefing = ico === '🌅';
    const isApproval = ico === '⏳';
    const txt=(msg.text||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    let style;
    if (isBriefing) {
      style = 'color:#fde68a;font-size:12px;line-height:1.65;background:linear-gradient(135deg,rgba(251,191,36,.10) 0%,rgba(244,114,182,.06) 60%,rgba(99,102,241,.04) 100%);border:1px solid rgba(251,191,36,.32);border-radius:14px;padding:14px 16px;margin-left:29px;font-family:system-ui,sans-serif;box-shadow:0 0 24px rgba(251,191,36,.10),inset 0 1px 0 rgba(255,255,255,.04);';
    } else if (isApproval) {
      style = 'color:#fda4af;font-size:12px;line-height:1.6;background:linear-gradient(135deg,rgba(251,191,36,.06),rgba(255,77,79,.06));border:1px solid rgba(251,191,36,.30);border-radius:12px;padding:11px 14px;margin-left:29px;font-family:system-ui,sans-serif;';
    } else {
      style = 'color:#94a3b8;font-size:12px;line-height:1.6;background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.25);border-radius:10px;padding:10px 14px;margin-left:29px;font-family:system-ui,sans-serif;';
    }
    const iconStyle = isBriefing ? 'margin-right:8px;font-size:18px;filter:drop-shadow(0 0 8px rgba(251,191,36,.6));' : 'margin-right:6px;';
    note.innerHTML='<div class="msg-body" style="'+style+'"><span style="'+iconStyle+'">'+ico+'</span>'+txt+'<span style="float:right;font-size:10px;color:#475569">'+getTime()+'</span></div>';
    chat.appendChild(note);
    chat.scrollTop=chat.scrollHeight;
    break;
  }
  case 'autoCycleActivity':
    /* 24시간 ON 동안 자율 사이클 진행 중 — 👔 버튼을 펄스로 빛내서
       사이드바가 일반 채팅 모드여도 에이전트가 일하는 중임을 알려줌. */
    if(corporateBtn){ corporateBtn.classList.toggle('autocycle-active', !!msg.active); }
    break;
  case 'corporateReady':
    renderAgentBoard(msg.agents||[],msg.companyDir||'');
    applyCompanyState(msg);
    break;
  case 'corporateState':
    applyCompanyState(msg);
    /* v2.89.106-107 — backend hired.json + active.json 동기화 */
    if (msg.activeAgents !== undefined) _backendActiveAgents = msg.activeAgents || {};
    if (msg.hiredAgents !== undefined) _backendHiredAgents = msg.hiredAgents || {};
    /* v2.89.107 — 모든 카드의 lock/inactive/idle 상태를 한 번에 갱신 */
    try {
      Object.keys(agentCardEls||{}).forEach(id=>{
        const card = agentCardEls[id]; if(!card) return;
        const locked = LOCKED_AGENTS[id] && !isAgentHired(id);
        const inactive = !locked && OPTIONAL_AGENTS.has(id) && !isAgentActive(id);
        card.classList.toggle('locked', locked);
        card.classList.toggle('inactive', inactive);
        card.classList.toggle('idle', !locked && !inactive);
        const oldIcon = card.querySelector('.ab-lock-icon');
        if (oldIcon) oldIcon.remove();
        if (locked || inactive) {
          const span = document.createElement('span');
          span.className = 'ab-lock-icon' + (inactive ? ' ab-inactive-icon' : '');
          if (inactive) { span.style.color = 'rgba(255,255,255,.65)'; span.style.textShadow = '0 0 6px rgba(255,255,255,.3)'; }
          span.textContent = locked ? '🔒' : '⏸';
          card.prepend(span);
        }
        const st = card.querySelector('.ab-status');
        if (st) {
          if (locked) { st.textContent = '입사 준비 중'; st.style.display = ''; }
          else if (inactive) { st.textContent = '비활성 (클릭해서 ON)'; st.style.display = ''; }
          else if (AGENT_LIVE[id]) { st.textContent = ''; st.style.display = 'none'; }
          else { st.textContent = '곧 합류'; st.style.display = ''; }
        }
      });
    } catch {}
    if(msg.note){addCorpBanner(msg.note);}
    /* 폴더는 막 만들어졌고 정체성이 비어있으면 바로 인터뷰.
       이미 위저드가 열려있으면 다시 띄우지 않음 — 입력 중인 값이 리셋되는
       버그를 막기 위해서. (corporateState는 companySetup 직후에 비동기로
       도착하는데, 그 시점에 위저드는 이미 떠있는 상태.) */
    if(corporateMode && companyState.folderExists && !companyState.configured){
      const wizardOpen = !!(_boot && _boot.content && _boot.content.querySelector('.boot-wstep'));
      if(!wizardOpen) setTimeout(showInterviewCard,200);
    }
    /* Setup-complete banner — fire once per session, not on every state echo */
    if(corporateMode && companyState.configured && !_setupCompletionAnnounced){
      _setupCompletionAnnounced=true;
      /* v2.89.91 — 셋업 완료 시 회사 정체성 + 사용 가능한 에이전트 라인업 한 줄로
         보여줘 사용자가 "이제 뭐 할 수 있지?" 즉시 파악. 이전엔 "설정 완료. 명령
         내려보세요" 만으로 무엇이 가능한지 모호했음. */
      const co = companyState.name || '회사';
      /* v2.89.110 — 기본 5명 ON + 옵션 4명 OFF + 루나 PIN. 사용자가 카드 클릭해서 자유롭게 변경 가능. */
      addCorpBanner('✅ '+co+' 출범! 9명 팀 — 🟢 기본 ON 5명: 🧭 CEO · 📺 YouTube · 🎨 디자이너 · ✍️ 작가 · 📅 비서 (사용자가 OFF 가능) / ⏸ 옵션 4명 (📷 인스타·💼 비즈·🛠 개발·🔍 리서치): 카드 클릭해서 ON / 🔒 1명 (🎵 루나): 채용 PIN 필요');
      addCorpBanner('💡 "다음 영상 컨셉 5개 뽑아줘" 처럼 자연어로 던지시면 CEO가 분배합니다.');
    }
    break;
  case 'sessionsList':
    /* v2.89.106-108 — 보관된 대화 세션 목록 수신.
       v2.89.108: payload 통째로 전달 (currentWorkspace 등 포함). */
    renderSessionsList(msg);
    break;
  case 'activeSession':
    /* v2.89.107 — 현재 활성 세션 ID 추적. 패널 열렸을 때 "현재" 라벨 붙이기 위함. */
    _activeSessionId = msg.id || null;
    _activeSessionTitle = msg.title || null;
    /* 패널이 열려있으면 즉시 강조 갱신 */
    if (_sessionsBackdrop) {
      const cur = _sessionsBackdrop.querySelector('.session-row.active');
      if (cur) cur.classList.remove('active');
      if (_activeSessionId) {
        const newCur = _sessionsBackdrop.querySelector('.session-row[data-id="'+_activeSessionId+'"]');
        if (newCur) newCur.classList.add('active');
      }
    }
    break;
  case 'userEcho':
    /* v2.89.106 — 세션 복원 시 사용자 메시지 다시 그리기 */
    addMsg(msg.value || '', 'user');
    break;
  case 'hiredAgents':
  case 'activeAgents':
    /* v2.89.106-107 — 채용/활성 상태 즉시 반영. 두 키 받음. */
    if (msg.type === 'hiredAgents') _backendHiredAgents = msg.value || {};
    if (msg.type === 'activeAgents') _backendActiveAgents = msg.value || {};
    try {
      Object.keys(agentCardEls||{}).forEach(id=>{
        const card = agentCardEls[id]; if(!card) return;
        const locked = LOCKED_AGENTS[id] && !isAgentHired(id);
        const inactive = !locked && OPTIONAL_AGENTS.has(id) && !isAgentActive(id);
        card.classList.toggle('locked', locked);
        card.classList.toggle('inactive', inactive);
        card.classList.toggle('idle', !locked && !inactive);
        /* 락/inactive 아이콘 갱신 */
        const oldIcon = card.querySelector('.ab-lock-icon');
        if (oldIcon) oldIcon.remove();
        if (locked || inactive) {
          const span = document.createElement('span');
          span.className = 'ab-lock-icon' + (inactive ? ' ab-inactive-icon' : '');
          if (inactive) { span.style.color = 'rgba(255,255,255,.65)'; span.style.textShadow = '0 0 6px rgba(255,255,255,.3)'; }
          span.textContent = locked ? '🔒' : '⏸';
          card.prepend(span);
        }
        const st = card.querySelector('.ab-status');
        if (st) {
          if (locked) { st.textContent = '입사 준비 중'; st.style.display = ''; }
          else if (inactive) { st.textContent = '비활성 (클릭해서 ON)'; st.style.display = ''; }
          else if (AGENT_LIVE[id]) { st.textContent = ''; st.style.display = 'none'; }
          else { st.textContent = '곧 합류'; st.style.display = ''; }
        }
      });
    } catch {}
    break;
  case 'agentConfigLoaded':
    if(_agentPanelLoadHandler)_agentPanelLoadHandler(msg);
    break;
  case 'toolConfigLoaded':
    if(_toolConfigLoadHandler)_toolConfigLoadHandler(msg);
    break;
  case 'companyConfigLoaded':
    if(_companyEditLoadHandler)_companyEditLoadHandler(msg);
    break;
  case 'companyConfigSaved':
    /* Save toast already shown locally; refresh badges via the
       upcoming corporateState echo. */
    break;
  case 'telegramValidateTokenResult':
  case 'telegramDetectChatIdResult':
  case 'telegramSendTestResult':
  case 'telegramSaveSetupResult':
    if(_twizMessageHandler)_twizMessageHandler(msg);
    break;
  case 'agentDispatch':{
    /* v2.89.102 — hideLoader 제거. CEO 분배 직후 specialist가 실제 토큰을
       내기까지 또 한참 걸리는데, 여기서 로더 죽이면 사용자는 다시 빈 화면 응시.
       로더는 첫 agentChunk 도착 시점에서만 사라지도록 위임. */
    document.body.classList.add('corp-dispatching');
    const taskIds=(msg.tasks||[]).map(t=>t.agent);
    showBriefCard(msg.brief||'',msg.tasks||[]);
    /* 모든 selected agent를 thinking 상태로 점등 */
    taskIds.forEach(id=>setCardState(id,'thinking'));
    /* SVG 빛줄기 */
    setTimeout(()=>drawDispatchBeams(['ceo'].concat(taskIds)),60);
    setTimeout(()=>{document.body.classList.remove('corp-dispatching');if(abSvg)abSvg.innerHTML='';},1700);
    break;
  }
  case 'agentStart':{
    /* v2.89.102 — 동일 — hideLoader는 첫 agentChunk에서. CEO planning 단계가
       길어도 매트릭스 로더가 끝까지 떠 있어서 사용자가 진행 상황 인지 가능. */
    setCardState(msg.agent,'working',msg.task);
    /* CEO는 카드 펄스만, specialist는 채팅 메시지도 시작 */
    if(msg.agent!=='ceo'){startAgentMsg(msg.agent,msg.task||'');}
    break;
  }
  case 'agentChunk':{
    /* v2.89.102 — 첫 specialist 토큰 도착 시 로더 정리. 실제 컨텐츠가 흐르기
       시작하는 진짜 순간에만 hide. */
    hideLoader();
    appendAgentChunk(msg.agent,msg.value||'');
    break;
  }
  case 'agentEnd':{
    setCardState(msg.agent,'done');
    endAgentMsg(msg.agent);
    break;
  }
  case 'agentPulse':{
    /* External pulse — light up the agent's chip briefly without altering
       chat flow. Uses the same setCardState path so visual feedback is
       consistent with what dispatch already does. */
    try {
      if (msg.agent) {
        setCardState(msg.agent, msg.deskState || 'thinking');
        setTimeout(()=>setCardState(msg.agent,'idle'), msg.ms || 3000);
      }
    } catch {}
    break;
  }
  case 'corporateReport':{
    /* v2.89.102 — 안전망. specialist가 한 번도 토큰 안 보내고 끝나도 로더 정리. */
    hideLoader();
    showReportCard(msg.brief||'',msg.report||'',msg.sessionPath||'',msg.sessionRel||'');
    setSending(false);
    /* 잠시 후 모든 카드 idle로 복귀 */
    setTimeout(()=>{Object.keys(agentCardEls).forEach(id=>setCardState(id,'idle'));},2200);
    break;
  }
  case 'agentConfer':{
    /* Confer turns belong to the office panel + conversation log only.
       Pile of these in the sidebar chat is noise — break here. */
    break;
  }
  case 'decisionsLearned':{
    const decs=msg.decisions||[];
    if(decs.length===0)break;
    leaveInitState();
    const el=document.createElement('div');el.className='msg';
    el.innerHTML='<div class="brief-card" style="--ag-color:#A78BFA;border-color:rgba(167,139,250,.4);background:linear-gradient(135deg,rgba(167,139,250,.06),rgba(167,139,250,.02));box-shadow:0 0 14px rgba(167,139,250,.15)">'
      +'<div class="brief-head" style="color:#A78BFA">🧠 자가학습 — decisions.md에 누적됨</div>'
      +'<div style="font-size:12px;color:var(--text-bright);line-height:1.7">'+decs.map(d=>'• '+esc(d)).join('<br>')+'</div>'
      +'</div>';
    chat.appendChild(el);scrollChatToBottomIfNear();
    break;
  }
  case 'telegramSent':{
    /* 사이드바에서는 작은 banner */
    addCorpBanner && addCorpBanner('📱 Secretary가 텔레그램으로 보고를 보냈어요.');
    break;
  }
} });
} catch(err) {
  document.body.innerHTML = '<div style="color:#ff4444;padding:20px;background:#111;height:100%;font-size:14px;overflow:auto;"><h2>⚠️ WEBVIEW JS CRASH</h2><pre>' + err.name + ': ' + err.message + '\n' + err.stack + '</pre></div>';
}
</script></body></html>
