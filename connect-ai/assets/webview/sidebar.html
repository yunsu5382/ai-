/* ===== 1인 기업 모드 ===== */
function applyCorporateMode(on){
  corporateMode=on;
  document.body.classList.toggle('corp-on',on);
  corporateBtn.style.opacity=on?'1':'0.5';
  /* 1인 기업 모드 ON = 골드 럭셔리 톤. 메인 앱의 --accent는 형광 녹색이라
     컨셉(럭셔리 골드)과 안 맞아서 명시적으로 골드 그라디언트 사용. */
  corporateBtn.style.background=on?'linear-gradient(135deg,#FBBF24,#F59E0B)':'';
  corporateBtn.title='AI 1인 기업 모드 (Solo Mode) — '+(on?'ON':'OFF (클릭해서 켜기)');
  input.placeholder=on?'한 줄 명령을 내리세요. 팀이 알아서 일합니다.':'무엇을 만들어 드릴까요?';
  /* Tell extension so autonomous corp activity is gated out of the sidebar
     while OFF. Office panel + conversation log keep recording either way. */
  try{vscode.postMessage({type:'corpModeToggle',on:!!on});}catch{}
  /* v2.89.116/117 — 기업 모드 ON이면 dock 데이터 즉시 로드(칩 텍스트 채움).
     OFF면 popover + drawer 둘 다 닫음. drawer는 사용자가 명시적으로 칩을
     눌러서 열어야 펼쳐짐 — 평소엔 칩 한 개만 보임. */
  if (on) {
    try { vscode.postMessage({type:'loadAgentDock'}); } catch {}
  } else {
    try { closeDockPopover(); } catch {}
    try { setDockOpen(false); } catch {}
  }
}

/* ========================================================================
   v2.89.116 — Specialist Dock (1인 기업 모드 전용)
   ------------------------------------------------------------------------
   기업 모드일 때 헤더 단일 모델 셀렉터를 9명 specialist의 미니 카드 줄로
   대체. 카드 클릭 → 인라인 popover (검색 + 모델 list + memory-safe 표시).
   "⚡ 자동" → _autoOrchestrateModelMap (시스템 사양 기반 best 매핑).
   "🔁 같게" → 모든 specialist를 한 모델로 통일.
   백엔드 메시지: loadAgentDock / setAgentModel / autoMapAgents / setAllAgents.
   ======================================================================== */
let _adInstalled = [];   /* 마지막으로 받은 설치된 모델 list (memory + tier 포함) */
let _adAgents = [];      /* 마지막 specialist 카드 데이터 */
let _adDefault = '';     /* 현재 default 모델 */
let _adActiveAgent = ''; /* popover 열린 상태에서 어떤 카드가 active인지 */
let _adPopover = null;   /* popover DOM 참조 */
let _adToastTimer = null;

function showAdToast(text){
  let t = document.getElementById('adToast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'adToast';
    t.style.cssText = 'position:fixed;bottom:18px;right:18px;background:linear-gradient(135deg,rgba(40,30,12,.98),rgba(8,6,4,.98));border:1px solid rgba(251,191,36,.55);color:#fef3c7;padding:9px 16px;border-radius:10px;font-size:12px;z-index:9999;box-shadow:0 8px 28px rgba(0,0,0,.6),0 0 18px rgba(251,191,36,.22);opacity:0;transform:translateY(8px);transition:opacity .25s,transform .25s;pointer-events:none;max-width:300px';
    document.body.appendChild(t);
  }
  t.textContent = text;
  requestAnimationFrame(()=>{ t.style.opacity='1'; t.style.transform='translateY(0)'; });
  if (_adToastTimer) clearTimeout(_adToastTimer);
  _adToastTimer = setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateY(8px)'; }, 2400);
}

/* v2.89.117 — drawer open/close + 칩 텍스트 요약. 평소엔 칩만 보이고,
   클릭으로 펼쳐졌을 때만 9명 dock이 슬라이드 다운. */
function setDockOpen(open){
  const dock = document.getElementById('agentDock');
  const chip = document.getElementById('adChip');
  if (!dock || !chip) return;
  const isOpen = !!open;
  dock.dataset.open = isOpen ? 'true' : 'false';
  chip.dataset.expanded = isOpen ? 'true' : 'false';
  chip.title = isOpen ? '클릭해서 닫기' : '9명 specialist 모델 매핑 — 클릭해서 펼치기';
  if (!isOpen) {
    try { closeDockPopover(); } catch {}
  }
}
function toggleDockOpen(){
  const dock = document.getElementById('agentDock');
  if (!dock) return;
  setDockOpen(dock.dataset.open !== 'true');
}

function _refreshDockChip(){
  const mdl = document.getElementById('adcModel');
  const chip = document.getElementById('adChip');
  if (!mdl || !chip) return;
  if (_adAgents.length === 0) {
    mdl.textContent = '…';
    mdl.classList.remove('mixed');
    chip.dataset.mixed = 'false';
    return;
  }
  /* 같은 모델? — 다 동일하면 그 모델명만(일반 select와 외형 거의 같음),
     혼합이면 "혼합 N종"으로 시각적 차별화. 이게 사용자가 "여러 모델 쓰고
     있구나" 즉시 인지하는 신호. */
  const usedSet = new Set(_adAgents.map(a => (a.currentModel || _adDefault || '').trim()));
  const installedIds = _adInstalled.map(m => m.id);
  const hasOrphan = _adAgents.some(a => {
    const m = (a.currentModel || _adDefault || '').trim();
    return m && installedIds.length > 0 && !installedIds.includes(m);
  });
  /* orphan 도트 부착/제거 */
  const oldDot = chip.querySelector('.adc-warn');
  if (oldDot) oldDot.remove();
  if (hasOrphan) {
    const dot = document.createElement('span');
    dot.className = 'adc-warn';
    dot.title = '⚠️ 매핑된 모델 중 현재 엔진에 없는 것이 있어요';
    chip.insertBefore(dot, chip.querySelector('.adc-caret'));
  }
  if (usedSet.size === 1) {
    const m = Array.from(usedSet)[0] || '미설정';
    const short = m.replace(/^google\//,'').replace(/^qwen\//,'').replace(/^nvidia\//,'');
    mdl.textContent = short;
    mdl.classList.remove('mixed');
    chip.dataset.mixed = 'false';
    chip.title = AGENTS_USING_LABEL(m);
  } else {
    mdl.textContent = '혼합 ' + usedSet.size + '종';
    mdl.classList.add('mixed');
    chip.dataset.mixed = 'true';
    chip.title = Array.from(usedSet).join(', ') + ' — 클릭해서 specialist별 매핑 보기';
  }
}
function AGENTS_USING_LABEL(model){
  return _adAgents.length + '명 모두 ' + model + ' 사용 중 — 클릭해서 specialist별 변경';
}

function renderAgentDock(data){
  if (data.error) {
    showAdToast('⚠️ ' + data.error);
  }
  _adInstalled = Array.isArray(data.installed) ? data.installed : [];
  _adAgents = Array.isArray(data.agents) ? data.agents : [];
  _adDefault = data.defaultModel || '';
  /* 칩 요약 갱신 — drawer 닫힌 상태에서도 항상 최신 정보 노출 */
  _refreshDockChip();
  const rail = document.getElementById('adRail');
  if (!rail) return;
  if (_adAgents.length === 0) {
    rail.innerHTML = '<div class="ad-rail-empty">specialist 정보가 없어요</div>';
    return;
  }
  rail.innerHTML = '';
  _adAgents.forEach(a => {
    const card = document.createElement('div');
    card.className = 'ag-card';
    card.dataset.agent = a.id;
    card.dataset.usingDefault = a.usingDefault ? 'true' : 'false';
    /* 모델이 설치 목록에 없으면 빨간 경고 도트 — 호출 시 깨짐 미리 알림 */
    const installedIds = _adInstalled.map(m=>m.id);
    if (a.currentModel && installedIds.length > 0 && !installedIds.includes(a.currentModel)) {
      card.dataset.status = 'warn';
      card.title = a.name + ' — 매핑된 모델 \'' + a.currentModel + '\'이 현재 엔진에 없어요. 다른 모델로 변경하세요.';
    } else {
      card.title = a.name + ' (' + (a.role||'') + ') · 클릭해서 모델 변경';
    }
    const shortModel = (a.currentModel || _adDefault || '미설정').replace(/^google\//,'').replace(/^qwen\//,'').replace(/^nvidia\//,'');
    card.innerHTML = ''
      + '<div class="ag-emoji">' + (a.emoji || '🤖') + '</div>'
      + '<div class="ag-text">'
      +   '<div class="ag-name">' + escAd(a.name||a.id) + '</div>'
      +   '<div class="ag-model">' + escAd(shortModel) + '</div>'
      + '</div>';
    card.addEventListener('click', (e)=>{ e.stopPropagation(); openDockPopover(card, a); });
    rail.appendChild(card);
  });
}

function escAd(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]||c))}

function closeDockPopover(){
  if (_adPopover && _adPopover.parentNode) _adPopover.parentNode.removeChild(_adPopover);
  _adPopover = null;
  _adActiveAgent = '';
  document.querySelectorAll('.ag-card.editing').forEach(c=>c.classList.remove('editing'));
}

function openDockPopover(card, agentData, opts){
  closeDockPopover();
  card.classList.add('editing');
  _adActiveAgent = agentData.id;
  const dock = document.getElementById('agentDock');
  if (!dock) return;
  const pop = document.createElement('div');
  pop.className = 'ad-popover';
  pop.id = 'adPopover';
  const isAllMode = opts && opts.allMode;
  const headEmoji = isAllMode ? '🔁' : (agentData.emoji||'🤖');
  const headName = isAllMode ? '모든 specialist 같은 모델로' : (agentData.name || agentData.id);
  const headRole = isAllMode ? '선택한 모델이 9명 모두에게 적용됩니다' : (agentData.role || '');
  pop.innerHTML = ''
    + '<div class="ad-popover-head">'
    +   '<div class="ph-emoji">' + headEmoji + '</div>'
    +   '<div class="ph-text"><div class="ph-name">' + escAd(headName) + '</div><div class="ph-role">' + escAd(headRole) + '</div></div>'
    +   '<button class="ph-close" id="phClose" type="button" title="닫기">×</button>'
    + '</div>'
    + '<input class="ad-popover-search" id="phSearch" type="text" placeholder="모델 검색 (예: gemma, qwen, 7b…)" />'
    + '<div class="ad-popover-list" id="phList"></div>'
    + (isAllMode ? '' : '<div class="ad-popover-foot"><span>현재: ' + escAd(agentData.currentModel || _adDefault || '미설정') + '</span><button class="pf-clear" id="phClear" type="button" title="이 specialist의 매핑을 지워서 default 모델 사용">매핑 지우기</button></div>');
  dock.appendChild(pop);
  _adPopover = pop;
  const search = pop.querySelector('#phSearch');
  const list = pop.querySelector('#phList');
  const closeBtn = pop.querySelector('#phClose');
  const clearBtn = pop.querySelector('#phClear');

  function paint(filter){
    list.innerHTML = '';
    const q = (filter||'').toLowerCase().trim();
    const filtered = _adInstalled.filter(m => !q || m.id.toLowerCase().includes(q));
    if (filtered.length === 0) {
      list.innerHTML = '<div class="ad-popover-empty">' + (q ? '검색 결과가 없어요. \'' + escAd(q) + '\'' : '설치된 모델이 없어요. LM Studio/Ollama에서 모델을 다운로드하세요.') + '</div>';
      return;
    }
    filtered.forEach(m => {
      const opt = document.createElement('div');
      opt.className = 'ad-mopt';
      const isSelected = !isAllMode && (agentData.currentModel === m.id);
      if (isSelected) opt.classList.add('selected');
      const memTxt = (m.estMemGB && m.estMemGB > 0) ? (m.estMemGB.toFixed(1) + 'GB') : '';
      const memCls = (m.safe === false) ? 'unsafe' : '';
      const tier = m.tier ? '<span class="mo-tier">' + escAd(m.tier) + '</span>' : '';
      const isDefault = (m.id === _adDefault);
      opt.innerHTML = ''
        + '<span class="mo-id">' + escAd(m.id) + '</span>'
        + tier
        + (memTxt ? '<span class="mo-mem ' + memCls + '" title="' + (m.safe===false?'⚠️ 메모리 부족 위험':'추정 메모리') + '">' + memTxt + '</span>' : '')
        + (isDefault ? '<span class="mo-default" title="현재 default 모델">DEFAULT</span>' : '');
      opt.addEventListener('click', ()=>{
        if (isAllMode) {
          vscode.postMessage({type:'setAllAgents', model: m.id});
        } else {
          vscode.postMessage({type:'setAgentModel', agent: agentData.id, model: m.id});
        }
        closeDockPopover();
      });
      list.appendChild(opt);
    });
  }
  paint('');
  search.addEventListener('input', ()=>paint(search.value));
  search.addEventListener('keydown', (e)=>{
    if (e.key === 'Escape') { e.preventDefault(); closeDockPopover(); }
    else if (e.key === 'Enter') {
      e.preventDefault();
      const first = list.querySelector('.ad-mopt');
      if (first) first.click();
    }
  });
  closeBtn.addEventListener('click', closeDockPopover);
  if (clearBtn) {
    clearBtn.addEventListener('click', ()=>{
      vscode.postMessage({type:'setAgentModel', agent: agentData.id, model: ''});
      closeDockPopover();
    });
  }
  setTimeout(()=>{ try { search.focus(); } catch {} }, 30);
}

/* 외부 클릭 시 popover + drawer 자동 닫기. drawer는 dock 안쪽이나
   trigger 칩(#adChip)을 클릭하면 닫지 않음 — 그 외 영역 클릭 시 닫힘. */
document.addEventListener('click', (e)=>{
  /* 1) popover (모델 선택 dropdown) 외부 클릭 → popover 닫기 */
  if (_adPopover) {
    if (_adPopover.contains(e.target)) return;
    if (e.target.closest && e.target.closest('.ag-card')) return;
    closeDockPopover();
  }
  /* 2) drawer 펼쳐진 상태에서 dock·칩 외부 클릭 → drawer 닫기 */
  const dock = document.getElementById('agentDock');
  if (dock && dock.dataset.open === 'true') {
    if (dock.contains(e.target)) return;
    if (e.target.closest && e.target.closest('#adChip')) return;
    setDockOpen(false);
  }
});

/* dock action 버튼 wiring — DOMContentLoaded 후 안전하게 binding */
function _wireDockActions(){
  /* v2.89.117 — drawer 칩 토글. 헤더에 단일 칩만 평소 노출, 클릭 시
     dock 슬라이드 다운. 외부 클릭으로도 닫힘 (popover와 같은 패턴). */
  const chip = document.getElementById('adChip');
  if (chip) chip.addEventListener('click', (e)=>{
    e.stopPropagation();
    toggleDockOpen();
  });
  const autoBtn = document.getElementById('adAutoBtn');
  const allBtn = document.getElementById('adAllBtn');
  const refreshBtn = document.getElementById('adRefreshBtn');
  if (autoBtn) autoBtn.addEventListener('click', ()=>{
    if (!confirm('⚡ 자동 매핑\n\n시스템 사양과 설치된 모델을 보고 9명 specialist의 모델을 자동으로 분배합니다.\n(예: 작은 모델 → CEO·비서 · 큰 모델 → researcher·youtube 분석)\n\n현재 매핑이 덮어써집니다. 계속할까요?')) return;
    vscode.postMessage({type:'autoMapAgents'});
  });
  if (allBtn) allBtn.addEventListener('click', ()=>{
    if (_adInstalled.length === 0) { showAdToast('설치된 모델이 없어요'); return; }
    /* 가짜 agent 데이터로 popover 재사용 — "all 모드" 플래그만 켜서 한 모델 선택 시 모든 specialist에 적용 */
    const card = document.querySelector('.ag-card');
    const anchor = card || allBtn;
    openDockPopover(anchor, { id:'__all__', name:'모든 specialist', emoji:'🔁', role:'선택한 모델이 9명 모두에게 적용됩니다', currentModel:'' }, { allMode:true });
  });
  if (refreshBtn) refreshBtn.addEventListener('click', ()=>{
    vscode.postMessage({type:'loadAgentDock'});
    showAdToast('↻ 모델 목록 새로고침');
  });
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', _wireDockActions);
} else {
  _wireDockActions();
}

/* Any corp UI append must drop body.init — otherwise .chat is flex:0 0 auto
   with overflow:visible (welcome layout), the cards pile up unbounded, and
   the input bar gets pushed off the bottom of the viewport. */
function leaveInitState(){
  document.body.classList.remove('init');
  const w=document.querySelector('.welcome');if(w)w.remove();
  document.querySelectorAll('.quick-actions').forEach(e=>e.remove());
}

function runCorporateClick(){
  /* 회사 폴더가 아직 없거나 정체성이 비어있으면 사이드바에서 셋업 먼저 */
  if(!companyState.folderExists){
    applyCorporateMode(true);
    /* 환영 온보딩에서 이미 두뇌 폴더를 정했다면 Stage 1을 묻지 않습니다
       (같은 질문 두 번 방지) — 기존 두뇌 안에 _shared/만 자동 생성. */
    if(companyState.brainExplicitlySet){
      addCorpBanner('👔 두뇌 폴더 안에 회사 구조를 만들고 있어요. 이름·목표 3가지만 알려주세요.');
      vscode.postMessage({ type:'companySetup', choice:'default' });
      showInterviewCard();
    } else {
      addCorpBanner('👔 처음이시군요. 회사 폴더를 어디에 만들까요?');
      showOnboardingCard();
    }
    return;
  }
  if(!companyState.configured){
    applyCorporateMode(true);
    addCorpBanner('👔 회사 폴더는 있지만 정체성이 비어있어요. 빠르게 3가지만 알려주세요.');
    showInterviewCard();
    return;
  }
  /* 셋업 완료 → 가상 사무실 토글 (열려있으면 닫고, 닫혀있으면 엶) */
  if (officeOpen) {
    vscode.postMessage({type:'closeOffice'});
  } else {
    applyCorporateMode(true);
    vscode.postMessage({type:'toggleOffice'});
  }
}

corporateBtn.addEventListener('click',()=>{

/* ===== Agent panel — clicking any card opens this ===== */
/* All agents now live — Mission editing, Retrieval Strategy (Self-RAG /
   Graph RAG), agent memory, and brain context bridge all work agent-agnostic.
   YouTube has the deepest tool catalog; the others just show empty Skills. */
const AGENT_LIVE = {ceo:true, youtube:true, instagram:true, designer:true, developer:true, business:true, secretary:true, editor:true, writer:true, researcher:true};
let _agentPanelOpen = false;
let _agentPanelLoadHandler = null;
let _toolConfigLoadHandler = null;
let _currentPanelAgent = null;

function showAgentPanel(agent){
  /* v2.87.5 — 방어: 이전 호출에서 어딘가 throw가 나서 _agentPanelOpen이
     true로 박혀있으면, DOM에 백드롭이 없는데도 패널이 안 열려서 사용자한테
     "아무 반응 없음"으로 보임. DOM 검사로 실제 열려있는지 확인 후 reset. */
  if(_agentPanelOpen){
    if(document.querySelector('.ap-backdrop')){
      return; /* 진짜로 열려있음 — 중복 방지 */
    }
    /* 플래그만 박혀있고 DOM은 비어있음 — 강제 reset */
    _agentPanelOpen = false;
    _currentPanelAgent = null;
    _agentPanelLoadHandler = null;
  }
  try {
    _showAgentPanelInner(agent);
  } catch(err){
    /* 패널 렌더 중 throw나면 플래그·핸들러 다 reset해서 다음 클릭은 살아있게 */
    _agentPanelOpen = false;
    _currentPanelAgent = null;
    _agentPanelLoadHandler = null;
    try { document.querySelectorAll('.ap-backdrop').forEach(b=>b.remove()); } catch(_){}
    console.error('[showAgentPanel] render failed:', err);
    try { vscode.postMessage({type:'log', msg:'showAgentPanel error: '+(err && err.message || err)}); } catch(_){}
  }
}
function _showAgentPanelInner(agent){

  }
  /* Pull the first MEANINGFUL line from goal.md as the preview pill text.
     Skips: H1 headings, H2 headings, blockquotes, blank lines, and the
     auto-generated header preamble. Falls back to a placeholder so the
     pill is never empty when goal.md is template-only. */
  function _extractMissionPreview(goalText){
    if(!goalText || !goalText.trim())return '';
    /* Note: this code lives inside a TS template literal, so \r and \n must
       be double-escaped — otherwise the outer literal turns \n into a real
       newline character before the webview parses the regex. That broke the
       whole script load (cascading: corp button, chat, all event listeners). */
    const lines = goalText.split(/\r?\n/);
    for(const ln of lines){
      const t = ln.trim();
      if(!t)continue;
      if(t.startsWith('#'))continue;
      if(t.startsWith('>'))continue;
      /* Strip leading list markers / bullets */
      const cleaned = t.replace(/^[-*•·]s*/, '').replace(/^d+.s*/, '').trim();
      if(!cleaned)continue;
      return cleaned;
    }
    return '';
  }
  function _refreshMissionPreview(){
    if(!missionPreview)return;
    const preview = _extractMissionPreview(goalEl.value);
    if(preview){
      missionPreview.textContent = preview;
      missionPreview.classList.remove('empty');
    } else {
      missionPreview.textContent = '미션이 비어 있어요 — 클릭해서 작성';
      missionPreview.classList.add('empty');
    }
  }
  function persistGoalIfChanged(){
    const v = goalEl.value;
    if(v === _lastSavedGoal)return;
    _lastSavedGoal = v;
    vscode.postMessage({type:'saveAgentGoal', agent: agent.id, goal: v});
    flashSaved();
    _refreshMissionPreview();
  }
  goalEl.addEventListener('input', ()=>{
    if(_saveDebounce)clearTimeout(_saveDebounce);
    _saveDebounce = setTimeout(persistGoalIfChanged, 700);
  });
  goalEl.addEventListener('blur', ()=>{
    if(_saveDebounce){clearTimeout(_saveDebounce);_saveDebounce=null;}
    persistGoalIfChanged();
  });
  /* Mission section expand/collapse — click the preview pill to reveal the
     editor, click again to collapse. Auto-focuses the textarea on expand
     so the user can start typing immediately. */
  if(missionHead && missionSection){
    missionHead.addEventListener('click', ()=>{
      const wasExpanded = missionSection.classList.contains('expanded');
      missionSection.classList.toggle('expanded');
      if(!wasExpanded){
        setTimeout(()=>{ try{ goalEl.focus(); }catch{} }, 80);
      } else {
        /* Collapsing — persist any pending edit + refresh preview */
        if(_saveDebounce){clearTimeout(_saveDebounce);_saveDebounce=null;}
        persistGoalIfChanged();
      }
    });
  }

  /* RAG mode segmented control — set active option, send save on click */
  const ragSeg = document.getElementById('apRagSeg');
  const ragSavedEl = document.getElementById('apRagSaved');
  const ragCriteriaWrap = document.getElementById('apRagCriteriaWrap');
  const ragCriteriaEl = document.getElementById('apRagCriteria');
  const ragCriteriaSaved = document.getElementById('apRagCritSaved');
  function setRagMode(mode){
    if(!ragSeg)return;
    const opts = ragSeg.querySelectorAll('.ap-rag-opt');
    opts.forEach(o=>{
      o.classList.toggle('on', o.getAttribute('data-mode')===mode);
    });
    /* Criteria textarea is only meaningful for Self-RAG. Hide for the
       other two so the panel stays uncluttered. */
    if(ragCriteriaWrap){
      ragCriteriaWrap.style.display = (mode === 'self-rag') ? '' : 'none';
    }
  }
  function flashRagSaved(){
    if(!ragSavedEl)return;
    ragSavedEl.classList.add('show');
    setTimeout(()=>ragSavedEl.classList.remove('show'), 1500);
  }
  if(ragSeg){
    ragSeg.addEventListener('click', e=>{
      const btn = e.target.closest('.ap-rag-opt');
      if(!btn)return;
      const mode = btn.getAttribute('data-mode');
      if(!mode)return;
      setRagMode(mode);
      vscode.postMessage({type:'saveAgentRagMode', agent: agent.id, mode});
      flashRagSaved();
      const labels = {'standard':'Graph RAG (자가검증 OFF)','self-rag':'Graph RAG + Self-RAG (자가검증 ON)'};
      showToast('✓ 검색 전략 → ' + (labels[mode]||mode));
    });
  }

  /* Self-RAG criteria autosave (debounced + on blur) */
  let _lastSavedCriteria = '';
  let _critSaveDebounce = null;
  function flashCritSaved(){
    if(!ragCriteriaSaved)return;
    ragCriteriaSaved.classList.add('show');
    setTimeout(()=>ragCriteriaSaved.classList.remove('show'), 1500);
  }
  function persistCriteriaIfChanged(){
    if(!ragCriteriaEl)return;
    const v = ragCriteriaEl.value;
    if(v === _lastSavedCriteria)return;
    _lastSavedCriteria = v;
    vscode.postMessage({type:'saveAgentSelfRagCriteria', agent: agent.id, criteria: v});
    flashCritSaved();
  }
  if(ragCriteriaEl){
    ragCriteriaEl.addEventListener('input', ()=>{
      if(_critSaveDebounce)clearTimeout(_critSaveDebounce);
      _critSaveDebounce = setTimeout(persistCriteriaIfChanged, 700);
    });
    ragCriteriaEl.addEventListener('blur', ()=>{
      if(_critSaveDebounce){clearTimeout(_critSaveDebounce);_critSaveDebounce=null;}
      persistCriteriaIfChanged();
    });
  }

  /* Request agent config + tools list */
  vscode.postMessage({type:'loadAgentConfig', agent: agent.id});
  _agentPanelLoadHandler = (msg)=>{
    if(msg.agent !== agent.id)return;
    goalEl.value = msg.goal || '';
    _lastSavedGoal = msg.goal || '';
    _refreshMissionPreview();
    /* 24h autoOn state handled by office topbar only (v2.69) */
    setRagMode(msg.ragMode || 'standard');
    if(ragCriteriaEl){
      ragCriteriaEl.value = msg.selfRagCriteria || '';
      _lastSavedCriteria = msg.selfRagCriteria || '';
    }
    const verifiedCountEl = document.getElementById('apVerifiedCount');
    if(verifiedCountEl) verifiedCountEl.textContent = String(msg.verifiedCount || 0);
    /* Telegram CTA — only Secretary, only when unconfigured. Wires direct
       to the wizard so users discover the 3-step setup without hunting. */
    if(agent.id === 'secretary'){
      const cta = document.getElementById('apTelegramCta');
      if(cta){
        if(msg.telegramConnected){
          cta.style.display = 'none';
        } else {
          cta.style.display = '';
          if(!cta.dataset.wired){
            cta.dataset.wired = '1';
            cta.addEventListener('click', () => {
              const tools = msg.tools || [];
              const tool = tools.find(t => t.name === 'telegram_setup');
              if(tool){
                showToolConfig(agent, tool);
              } else {
                showToast('⚠️ telegram_setup 도구를 찾지 못했어요. 회사 폴더 설정을 확인하세요.');
              }
            });
          }
        }
      }
    }
    renderTools(msg.tools || []);
  };
  /* Open the agent's verified.md file via the existing folder-open message
     (sub path drills into the agent's _agents/{id} folder; user can open
     verified.md from there). */
  const verifiedOpenBtn = document.getElementById('apVerifiedOpen');
  if(verifiedOpenBtn){
    verifiedOpenBtn.addEventListener('click', ()=>{
      vscode.postMessage({type:'openCompanyFolder', sub:'_agents/' + agent.id});
    });
  }


  /* saveRunBtn removed in v2.68 — the 24h toggle is the primary control now.
     If the button still exists in some legacy webview HTML, this guard keeps
     the listener wiring safe. */
  if(saveRunBtn){
    saveRunBtn.addEventListener('click',()=>{
      persistGoalIfChanged();
      vscode.postMessage({type:'runAgentStep', agent: agent.id});
      showToast('✓ 에이전트가 작업을 시작합니다.');
      setTimeout(close, 700);
    });
  }
}

/* ===== Tool config modal — opens above agent panel ===== */
function showToolConfig(agent, tool){
  /* The Secretary's telegram_setup tool gets a guided wizard instead of the
     plain key/value form — token validation, chat_id auto-detect, and test
     send are all driven from one screen so non-developers don't need to
     touch URLs or JSON. */
  if (tool && tool.name === 'telegram_setup') {
    showTelegramWizard(agent, tool);
    return;
  }
  /* Google Calendar write OAuth wizard runs host-side (needs loopback HTTP
     server + browser open). Just trigger the command — VS Code shows the
     guided modal flow there. */
  if (tool && tool.name === 'google_calendar_write') {
    vscode.postMessage({ type: 'runCalendarWriteWizard' });
    return;
  }
  const bd = document.createElement('div');
  bd.className = 'tc-backdrop';
  const helpHtml = tool.name === 'trend_sniper'
    ? '<div class="tc-help">💡 <strong>API 키 발급</strong>: <code>console.cloud.google.com</code> → 프로젝트 생성 → <code>YouTube Data API v3</code> 사용 설정 → 사용자 인증 정보 → API 키 만들기. 무료 할당량 충분합니다.</div>'
    : '';
  bd.innerHTML = '<div class="tc-modal">'
    + '<div class="tc-head">'
    +   '<div class="tc-title"><div class="tc-tool-name">'+esc(tool.displayName)+'</div><div class="tc-tool-desc">'+esc(tool.description||'')+'</div></div>'
    +   '<button class="ap-close" id="tcClose" aria-label="닫기">×</button>'
    + '</div>'
    + '<div class="tc-body" id="tcBody"></div>'
    + helpHtml
    + '<div class="tc-actions">'
    +   '<button class="tc-btn secondary" id="tcOpenFile">📝 파일로 열기</button>'
    +   '<button class="tc-btn" id="tcSave">💾 저장</button>'
    + '</div>'
    + '</div>';
  document.body.appendChild(bd);

  function close(){
    bd.style.transition='opacity .15s';bd.style.opacity='0';
    setTimeout(()=>bd.remove(),150);
    _toolConfigLoadHandler = null;
  }
  document.getElementById('tcClose').addEventListener('click',close);
  bd.addEventListener('click',e=>{if(e.target===bd)close();});

  const body = document.getElementById('tcBody');
  function renderFields(schema){
    body.innerHTML = '';
    schema.forEach(field=>{
      const wrap = document.createElement('div');
      wrap.className = 'tc-field';
      // v2.89.72 — labelHelp가 type별 + hint(있으면) 둘 다
      const typeHelp = field.type==='password'?'비밀로 저장됨':field.type==='list'?'한 줄에 하나씩':field.type==='select'?'드롭다운에서 선택':'';
      const labelHelp = field.hint ? field.hint : typeHelp;
      let inputHtml;
      if(field.type === 'list'){
        const txt = Array.isArray(field.value) ? field.value.join('\n') : '';
        inputHtml = '<textarea class="tc-list" data-key="'+esc(field.key)+'">'+esc(txt)+'</textarea>';
      } else if(field.type === 'password'){
        inputHtml = '<input type="password" class="tc-input password" data-key="'+esc(field.key)+'" value="'+esc(String(field.value||''))+'" placeholder="여기에 입력하세요">';
      } else if(field.type === 'number'){
        inputHtml = '<input type="number" class="tc-input" data-key="'+esc(field.key)+'" value="'+esc(String(field.value||''))+'">';
      } else if(field.type === 'select'){
        // v2.89.72 — 드롭다운. options에서 매칭되는 값 selected, 아니면 첫번째.
        const opts = field.options || [];
        const currentVal = String(field.value || '');
        const optsHtml = opts.map(o => {
          const v = esc(String(o.value||''));
          const l = esc(String(o.label||o.value||''));
          const sel = (currentVal === o.value) ? ' selected' : '';
          return '<option value="'+v+'"'+sel+'>'+l+'</option>';
        }).join('');
        // 빈 값 옵션 추가 (사용자가 지우고 싶을 때 + auto-recommend 표시)
        const emptyOpt = (currentVal === '') ? '<option value="" selected>(자동 추천)</option>' : '<option value="">(자동 추천)</option>';
        inputHtml = '<select class="tc-input tc-select" data-key="'+esc(field.key)+'">'+emptyOpt+optsHtml+'</select>';
      } else {
        inputHtml = '<input type="text" class="tc-input" data-key="'+esc(field.key)+'" value="'+esc(String(field.value||''))+'">';
      }
      wrap.innerHTML = '<label class="tc-label">'+esc(field.label)+(labelHelp?'<span class="tc-label-help">'+esc(labelHelp)+'</span>':'')+'</label>' + inputHtml;
      body.appendChild(wrap);
    });
  }

  /* Load fresh schema from extension (in case tool .json was edited externally) */
  vscode.postMessage({type:'loadToolConfig', agent: agent.id, tool: tool.name});
  _toolConfigLoadHandler = (msg)=>{
    if(msg.agent !== agent.id || msg.tool !== tool.name)return;
    renderFields(msg.schema || tool.configSchema || []);
  };
  /* Show what we already have, in case the load message races */
  renderFields(tool.configSchema || []);

  document.getElementById('tcOpenFile').addEventListener('click',()=>{
    vscode.postMessage({type:'openToolFile', agent: agent.id, tool: tool.name, kind:'config'});
    close();
  });
  document.getElementById('tcSave').addEventListener('click',()=>{
    const inputs = body.querySelectorAll('[data-key]');
    const values = {};
    inputs.forEach(el=>{
      const key = el.getAttribute('data-key');
      if(el.classList.contains('tc-list')){
        values[key] = el.value.split('\n').map(s=>s.trim()).filter(Boolean);
      } else if(el.type === 'number'){
        const n = parseFloat(el.value);
        values[key] = Number.isFinite(n) ? n : 0;
      } else if(el.classList.contains('tc-select')){
        // v2.89.72 — select 값이 순수 숫자면 number로 저장 (INTERVAL_HOURS 등). 아니면 string.
        const v = el.value;
        if(v !== '' && /^-?\d+(\.\d+)?$/.test(v)){
          values[key] = parseFloat(v);
        } else {
          values[key] = v;
        }
      } else {
        values[key] = el.value;
      }
    });
    vscode.postMessage({type:'saveToolConfig', agent: agent.id, tool: tool.name, config: values});
    /* Reload agent config so panel shows updated tool */
    vscode.postMessage({type:'loadAgentConfig', agent: agent.id});
    close();
  });
}

/* ════════════════════════════════════════════════════════════════════════
   TELEGRAM SETUP WIZARD — replaces the generic key/value form for the
   Secretary's telegram_setup tool. Three stages, each verified server-side:
     1) 토큰 입력 → getMe로 봇 식별 자동 검증
     2) chat_id 자동 감지 → /start 안내 + getUpdates 스캔
     3) 테스트 발송 → sendMessage 핑
   ──────────────────────────────────────────────────────────────────────── */
let _twiz = null; /* { backdrop, stage, token, chatId, botUsername } */
let _twizMessageHandler = null;
function showTelegramWizard(agent, tool){
  if (_twiz) return; // already open
  const bd = document.createElement('div');
  bd.className = 'twiz-backdrop';
  bd.style.cssText = 'position:fixed !important; top:0 !important; left:0 !important; right:0 !important; bottom:0 !important; width:100vw !important; height:100vh !important; z-index:99998 !important; display:flex !important; align-items:center; justify-content:center; padding:24px; box-sizing:border-box; background:radial-gradient(ellipse at top,rgba(0,30,55,.9) 0%,rgba(0,0,0,.97) 70%); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); animation:bootIn .3s ease-out';
  bd.innerHTML = '<div class="twiz-stage"><div class="twiz-content" id="twizContent"></div></div>';
  document.body.appendChild(bd);
  _twiz = { backdrop: bd, content: bd.querySelector('#twizContent'), token: '', chatId: '', botUsername: '' };
  function escHandler(e){ if(e.key === 'Escape') closeTelegramWizard(); }
  document.addEventListener('keydown', escHandler);
  bd.addEventListener('click', e => { if (e.target === bd) closeTelegramWizard(); });
  _twiz._esc = escHandler;
  /* Single message router for wizard responses */
  _twizMessageHandler = (msg) => {
    if (!_twiz) return;
    if (msg.type === 'telegramValidateTokenResult')   _twizOnValidate(msg);
    else if (msg.type === 'telegramDetectChatIdResult') _twizOnDetect(msg);
    else if (msg.type === 'telegramSendTestResult')     _twizOnTest(msg);
    else if (msg.type === 'telegramSaveSetupResult')    _twizOnSaved(msg);
  };
  twizRenderStep1();
}
function closeTelegramWizard(){
  if (!_twiz) return;
  document.removeEventListener('keydown', _twiz._esc);
  _twizMessageHandler = null;
  _twiz.backdrop.style.transition = 'opacity .25s';
  _twiz.backdrop.style.opacity = '0';
  setTimeout(() => { if (_twiz) { _twiz.backdrop.remove(); _twiz = null; } }, 280);
}
function twizSet(html){ if (_twiz && _twiz.content) _twiz.content.innerHTML = html; }

function twizRenderStep1(){
  twizSet(
    '<div class="twiz-head">'
    +   '<div class="twiz-progress"><span class="twiz-dot active">1</span><span class="twiz-line"></span><span class="twiz-dot">2</span><span class="twiz-line"></span><span class="twiz-dot">3</span></div>'
    +   '<div class="twiz-tag">📨 텔레그램 연결 마법사 · 단계 1 / 3</div>'
    +   '<div class="twiz-h1">봇 토큰을 받아오세요</div>'
    +   '<div class="twiz-sub">텔레그램에서 새 봇을 만들고 토큰을 복사해 아래에 붙여넣으세요. 검증은 자동입니다 — 잘못된 토큰이면 즉시 알려드려요.</div>'
    + '</div>'
    + '<div class="twiz-body">'
    +   '<a class="twiz-link-btn" href="https://t.me/BotFather" target="_blank" rel="noopener">'
    +     '<span class="tlb-emoji">🤖</span>'
    +     '<span class="tlb-text"><span class="tlb-title">BotFather 열기</span><span class="tlb-desc">새 탭에서 텔레그램 → /newbot 또는 /revoke로 토큰 받기</span></span>'
    +     '<span class="tlb-arrow">↗</span>'
    +   '</a>'
    +   '<div class="twiz-field">'
    +     '<label class="twiz-label">봇 토큰 (콜론 포함 통째로)</label>'
    +     '<input class="twiz-input" type="password" id="twizToken" placeholder="예: 1234567890:ABCdefGhiJkl..." spellcheck="false" autocomplete="off">'
    +     '<div class="twiz-status" id="twizStatus">붙여넣으면 자동으로 검증합니다</div>'
    +   '</div>'
    + '</div>'
    + '<div class="twiz-foot">'
    +   '<button class="twiz-btn ghost" id="twizCancel">취소 (ESC)</button>'
    +   '<span class="twiz-spacer"></span>'
    +   '<button class="twiz-btn primary" id="twizNext1" disabled>다음 →</button>'
    + '</div>'
  );
  const inp = document.getElementById('twizToken');
  const status = document.getElementById('twizStatus');
  const next = document.getElementById('twizNext1');
  let validateTimer = null;
  function setStatus(text, kind){
    status.className = 'twiz-status' + (kind ? ' ' + kind : '');
    status.textContent = text;
  }
  function cleanToken(raw){
    /* Strip all whitespace (including unicode NBSP / zero-width / newlines),
       a leading "bot" prefix the user might paste from a URL, and surrounding
       quotes. Then accept whatever — let Telegram be the judge. */
    let v = String(raw || '');
    v = v.replace(/s+/g, '');
    v = v.replace(/[ ​‌‍﻿]+/g, '');
    v = v.replace(/^["']+|["']+$/g, '');
    if (/^bot/i.test(v)) v = v.replace(/^bot/i, '');
    return v;
  }
  function tryValidate(){
    const v = cleanToken(inp.value);
    if (!v) { setStatus('붙여넣으면 자동으로 검증합니다'); next.disabled = true; return; }
    if (!v.includes(':')) {
      setStatus('⚠️ 토큰에 콜론(:)이 없어요. BotFather가 준 줄 통째로 — 123:ABC... 형태로 붙여넣어주세요', 'error');
      next.disabled = true;
      return;
    }
    setStatus('🔍 텔레그램에 봇 확인 요청 중…', 'loading');
    next.disabled = true;
    _twiz.token = v;
    /* If we cleaned the input, reflect it back so user sees what's being sent */
    if (inp.value !== v) inp.value = v;
    vscode.postMessage({ type:'telegramValidateToken', token: v });
  }
  inp.addEventListener('input', () => {
    if (validateTimer) clearTimeout(validateTimer);
    validateTimer = setTimeout(tryValidate, 400);
  });
  inp.addEventListener('paste', () => {
    setTimeout(tryValidate, 30);
  });
  document.getElementById('twizCancel').addEventListener('click', closeTelegramWizard);
  next.addEventListener('click', () => {
    if (next.disabled) return;
    twizRenderStep2();
  });
  setTimeout(() => inp.focus(), 60);
}
function _twizOnValidate(msg){
  const status = document.getElementById('twizStatus');
  const next = document.getElementById('twizNext1');
  if (!status || !next) return; // user navigated away
  if (msg.ok) {
    _twiz.botUsername = msg.username || '';
    status.className = 'twiz-status ok';
    status.innerHTML = '✅ 검증 통과 — 봇: <strong>@' + esc(msg.username) + '</strong> (' + esc(msg.botName || '') + ')';
    next.disabled = false;
  } else {
    status.className = 'twiz-status error';
    status.textContent = '❌ ' + (msg.error || '검증 실패') + ' — BotFather에서 새 토큰 받아보세요';
    next.disabled = true;
  }
}

function twizRenderStep2(){
  const handle = _twiz.botUsername ? '@' + _twiz.botUsername : '봇';
  const startUrl = _twiz.botUsername ? ('https://t.me/' + _twiz.botUsername) : 'https://t.me/';
  twizSet(
    '<div class="twiz-head">'
    +   '<div class="twiz-progress"><span class="twiz-dot done">✓</span><span class="twiz-line done"></span><span class="twiz-dot active">2</span><span class="twiz-line"></span><span class="twiz-dot">3</span></div>'
    +   '<div class="twiz-tag">📨 텔레그램 연결 마법사 · 단계 2 / 3</div>'
    +   '<div class="twiz-h1"><span class="accent">' + esc(handle) + '</span>한테 인사하기</div>'
    +   '<div class="twiz-sub">봇과 한 번 대화를 시작해야 메시지를 받을 수 있어요. 아래 버튼으로 봇 채팅창 열고 <strong>/start</strong>를 보내주세요. 그다음 자동 감지 누르면 본인 chat_id를 찾아드립니다.</div>'
    + '</div>'
    + '<div class="twiz-body">'
    +   '<a class="twiz-link-btn" href="' + startUrl + '" target="_blank" rel="noopener">'
    +     '<span class="tlb-emoji">💬</span>'
    +     '<span class="tlb-text"><span class="tlb-title">' + esc(handle) + ' 채팅 열기</span><span class="tlb-desc">새 탭에서 채팅창 → 시작(/start) 버튼 누르기</span></span>'
    +     '<span class="tlb-arrow">↗</span>'
    +   '</a>'
    +   '<div class="twiz-field">'

function _twizOnDetect(msg){
  const chatInput = document.getElementById('twizChatId');
  const status = document.getElementById('twizStatus');
  const next = document.getElementById('twizNext2');
  if (!chatInput || !status || !next) return;
  if (!msg.ok) {
    status.className = 'twiz-status error';
    status.textContent = '❌ ' + (msg.error || '감지 실패');
    return;
  }
  const chats = msg.chats || [];
  if (chats.length === 0) {
    status.className = 'twiz-status error';
    status.innerHTML = '⚠️ 최근 대화가 없어요. <strong>봇 채팅창에서 /start를 먼저 보내주세요</strong> — 그다음 다시 자동 감지.';
    return;
  }
  if (chats.length === 1) {
    chatInput.value = String(chats[0].id);
    _twiz.chatId = String(chats[0].id);
    status.className = 'twiz-status ok';
    status.innerHTML = '✅ 감지됨 — <strong>' + esc(chats[0].name) + '</strong> (id: ' + chats[0].id + ')';
    next.disabled = false;
  } else {
    /* Multiple chats — let user pick */
    let opts = '<div class="twiz-status">여러 명이 봇과 대화했네요. 본인 계정을 선택하세요:</div><div class="twiz-chat-pick">';
    for (const c of chats) {
      opts += '<button class="twiz-chat-opt" data-id="' + c.id + '" data-name="' + esc(c.name) + '" type="button"><strong>' + esc(c.name) + '</strong><span>id ' + c.id + '</span></button>';
    }
    opts += '</div>';
    status.outerHTML = '<div class="twiz-status">' + opts + '</div>';
    document.querySelectorAll('.twiz-chat-opt').forEach(b => {
      b.addEventListener('click', () => {
        const id = b.getAttribute('data-id');
        const name = b.getAttribute('data-name');
        chatInput.value = id;
        _twiz.chatId = id;
        next.disabled = false;
        document.querySelectorAll('.twiz-chat-opt').forEach(x => x.classList.remove('on'));
        b.classList.add('on');
      });
    });
  }
}

let _boot = null; /* { backdrop, stage, mode } */
function bootEnsure(){
  if(_boot && _boot.backdrop && document.body.contains(_boot.backdrop)) return _boot;
  const bd = document.createElement('div');
  bd.className = 'boot-backdrop';
  /* Inline styles outrank any host CSS that drops position:fixed back into
     body's flex column flow (we saw it pin to bottom-left on some hosts). */
  bd.style.cssText = 'position:fixed !important; top:0 !important; left:0 !important; right:0 !important; bottom:0 !important; width:100vw !important; height:100vh !important; z-index:99997 !important; display:flex !important; align-items:center; justify-content:center; margin:0; padding:24px; box-sizing:border-box';
  /* Twinkling starfield — pre-generate ~36 stars at random positions/timings
     for ambient depth behind the wizard. Pure CSS twinkle, near-zero cost. */
  let starsHtml = '<div class="boot-stars">';
  const STAR_COUNT = 36;
  for (let i = 0; i < STAR_COUNT; i++) {
    const x = (Math.random() * 100).toFixed(1);
    const y = (Math.random() * 100).toFixed(1);
    const dur = (5 + Math.random() * 7).toFixed(1);
    const delay = (Math.random() * 6).toFixed(1);
    const size = (1 + Math.random() * 2).toFixed(1);
    starsHtml += '<span style="left:' + x + '%;top:' + y + '%;width:' + size + 'px;height:' + size + 'px;--st:' + dur + 's;--sd:' + delay + 's"></span>';
  }
  starsHtml += '</div>';
  bd.innerHTML =
    starsHtml
    + '<div class="boot-stage" id="bootStage">'
    + '<span class="boot-corner tl"></span><span class="boot-corner tr"></span>'
    + '<span class="boot-corner bl"></span><span class="boot-corner br"></span>'
    + '<button class="boot-close" id="bootClose">[ESC] 닫기</button>'
    + '<div id="bootContent"></div>'
    + '</div>';
  document.body.appendChild(bd);
  _boot = { backdrop: bd, stage: bd.querySelector('#bootStage'), content: bd.querySelector('#bootContent') };
  document.getElementById('bootClose').addEventListener('click', bootClose);
  function esc(e){ if(e.key==='Escape') bootClose(); }
  bd.addEventListener('keydown', esc);
  document.addEventListener('keydown', esc);
  _boot._esc = esc;
  return _boot;
}
function bootClose(){
  if(!_boot) return;
  _boot.backdrop.classList.add('closing');
  document.removeEventListener('keydown', _boot._esc);
  setTimeout(()=>{ if(_boot){ _boot.backdrop.remove(); _boot = null; } }, 320);
}
function bootSetContent(html){
  const b = bootEnsure();
  b.content.innerHTML = html;
}
/* Smaller burst aimed at the Next button when advancing through wizard steps.
   Subtle vs the full celebration burst — 12 particles in a tight upward fan. */
function bootStepAdvanceBurst(){
  if(!_boot) return;
  const nextBtn = document.getElementById('bwNext');
  if(!nextBtn) return;
  const r = nextBtn.getBoundingClientRect();
  const cx = r.left + r.width / 2;
  const cy = r.top + r.height / 2;
  const layer = document.createElement('div');
  layer.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:99998';
  const N = 14;
  for(let i = 0; i < N; i++){
    const p = document.createElement('span');
    const angle = (-Math.PI / 2) + (Math.random() - .5) * (Math.PI * 0.7);
    const dist = 60 + Math.random() * 60;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    p.style.cssText = 'position:absolute;left:' + cx + 'px;top:' + cy + 'px;width:3px;height:3px;border-radius:50%;background:' + (i % 3 === 0 ? '#FFB266' : 'var(--accent)') + ';box-shadow:0 0 6px ' + (i % 3 === 0 ? '#FFB266' : 'var(--accent)') + ';transform:translate(-50%,-50%);opacity:1;transition:transform .8s cubic-bezier(.16,1,.3,1),opacity .8s ease-out';
    layer.appendChild(p);
    requestAnimationFrame(() => {
      p.style.transform = 'translate(calc(-50% + ' + dx.toFixed(0) + 'px), calc(-50% + ' + dy.toFixed(0) + 'px)) scale(.4)';
      p.style.opacity = '0';
    });
  }
  document.body.appendChild(layer);
  setTimeout(() => layer.remove(), 900);
}
function bootBurstParticles(){
  /* Quick celebratory burst from center of stage. CSS-driven, no libs. */
  if(!_boot) return;
  const layer = document.createElement('div');
  layer.className = 'boot-particles';
  _boot.stage.appendChild(layer);
  const N = 26;
  for(let i=0;i<N;i++){
    const p = document.createElement('span');
    p.className = 'boot-particle';
    const angle = (i / N) * Math.PI * 2;
    const dist = 140 + Math.random() * 140;
    p.style.left = '50%';
    p.style.top  = '50%';
    p.style.setProperty('--dx', (Math.cos(angle) * dist).toFixed(0) + 'px');
    p.style.setProperty('--dy', (Math.sin(angle) * dist).toFixed(0) + 'px');
    p.style.background = (i % 3 === 0) ? '#FFB266' : 'var(--accent)';
    p.style.boxShadow  = '0 0 8px ' + (i % 3 === 0 ? '#FFB266' : 'var(--accent)');
    p.style.animationDelay = (Math.random() * 0.15).toFixed(2) + 's';
    layer.appendChild(p);
    requestAnimationFrame(()=>p.classList.add('go'));
  }
  setTimeout(()=>layer.remove(), 1800);
  /* Full-screen flash too */
  const flash = document.createElement('div');
  flash.className = 'boot-flash';
  document.body.appendChild(flash);
  setTimeout(()=>flash.remove(), 1100);
}

function _bootProgressHtml(active){
  /* Liquid gradient bar — fills based on current step index (0/1/2 → 33/66/100%).
     The dot+line legacy markup is kept above the bar as small step labels for
     orientation; the bar itself is the visual centerpiece. */
  const pct = ((active + 1) / _BOOT_STEPS.length) * 100;
  let dots = '<div class="boot-progress">';
  for(let i=0;i<_BOOT_STEPS.length;i++){
    const cls = i < active ? 'done' : (i === active ? 'active' : '');
    dots += '<div class="boot-progress-step ' + cls + '"><span class="bp-num">' + (i+1) + '</span>'
         +  '<span>' + (i===0?'정체성':(i===1?'목표':'필요')) + '</span></div>';
    if(i < _BOOT_STEPS.length - 1){
      dots += '<div class="boot-progress-line ' + (i < active ? 'done' : '') + '"></div>';
    }
  }
  dots += '</div>';
  return dots + '<div class="boot-progress-bar" style="--pf:' + pct.toFixed(1) + '%"></div>';
}
/* Wraps each character of an HTML string in a stagger span while preserving
   inner tags (e.g. accent spans). Spaces get a marker class so CSS can
   render them with a stable width. */
function _bootStaggerH1(html){
  let out = '';
  let i = 0;
  let charIdx = 0;
  while(i < html.length){
    if(html[i] === '<'){
      const close = html.indexOf('>', i);
      if(close === -1){ out += html.slice(i); break; }
      out += html.slice(i, close + 1);
      i = close + 1;
      continue;
    }
    const ch = html[i];
    const cls = ch === ' ' ? 'boot-h1-char space' : 'boot-h1-char';
    out += '<span class="' + cls + '" style="--ci:' + charIdx + '">' + (ch === ' ' ? '' : esc(ch)) + '</span>';
    charIdx++;
    i++;
  }
  return out;
}
function _bootFieldHtml(f, fi){
  const help = f.help ? '<span class="boot-field-help">' + f.help + '</span>' : '';
  const styleAttr = ' style="--fi:' + (fi || 0) + '"';
  if(f.textarea){
    return '<div class="boot-field"' + styleAttr + '>'
         + '<div class="boot-field-label">' + f.emoji + ' ' + f.label + help + '</div>'
         + '<div class="boot-input-wrap"><textarea class="boot-textarea" id="bw_' + f.key + '" placeholder="' + f.placeholder + '"></textarea></div>'
         + '</div>';
  }
  return '<div class="boot-field"' + styleAttr + '>'
       + '<div class="boot-field-label">' + f.emoji + ' ' + f.label + help + '</div>'
       + '<div class="boot-input-wrap"><input class="boot-input" id="bw_' + f.key + '" placeholder="' + f.placeholder + '"></div>'
       + '</div>';
}

  const nextBtn = isLast
    ? '<button class="boot-btn primary" id="bwNext">✨ 회사 출범 →</button>'
    : '<button class="boot-btn primary" id="bwNext">계속 →</button>';
  bootSetContent(
    '<div class="boot-head">'
    +   '<div class="boot-tag"><span class="boot-tag-dot"></span>' + step.tag + '</div>'
    +   '<div class="boot-h1">' + _bootStaggerH1(step.h1) + '</div>'
    +   '<div class="boot-sub">' + step.sub + '</div>'
    + '</div>'
    + _bootProgressHtml(idx)
    + '<div class="boot-body">' + body + '</div>'
    + '<div class="boot-foot">'
    +   prevBtn
    +   '<span class="boot-spacer"></span>'
    +   '<span class="boot-foot-hint">Enter = 다음</span>'
    +   nextBtn
    + '</div>'
  );
  /* Restore previously typed values for this step */
  for(const f of step.fields){
    const el = document.getElementById('bw_' + f.key);
    if(el) el.value = _BOOT_WIZ[f.key] || '';
  }
  setTimeout(()=>{ const first = document.getElementById('bw_' + step.fields[0].key); if(first) first.focus(); }, 80);

  function captureStep(){
    for(const f of step.fields){
      const el = document.getElementById('bw_' + f.key);
      if(el) _BOOT_WIZ[f.key] = (el.value || '').trim();
    }
  }
  function goNext(){
    captureStep();
    if(isLast){
      vscode.postMessage({ type:'companyInterview', answers: Object.assign({}, _BOOT_WIZ) });
      bootRenderTeamReveal();
      return;
    }
    /* Tiny celebratory burst from the Next button on each step advance —
       gives the wizard a satisfying "snap forward" feel between steps. */
    bootStepAdvanceBurst();
    /* Animate exit then render next */
    const wstep = _boot.content.querySelector('.boot-wstep');
    if(wstep){
      wstep.classList.remove('enter');
      wstep.classList.add('exit');
      setTimeout(()=>bootRenderWizard(idx+1), 220);
    } else {
      bootRenderWizard(idx+1);
    }
  }
  function goPrev(){
    captureStep();
    bootRenderWizard(idx-1);
  }
  const nextEl = document.getElementById('bwNext'); if(nextEl) nextEl.addEventListener('click', goNext);
  const prevEl = document.getElementById('bwPrev'); if(prevEl) prevEl.addEventListener('click', goPrev);
  const skipEl = document.getElementById('bwSkip');
  if(skipEl) skipEl.addEventListener('click', ()=>{
    vscode.postMessage({ type:'companyInterview', answers:{} });
    bootRenderTeamReveal();
  });
  /* Enter advances. Shift+Enter newline in textareas. */
  step.fields.forEach(f=>{
    const el = document.getElementById('bw_' + f.key);
    if(!el) return;
    el.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter' && !e.shiftKey && !f.textarea){ e.preventDefault(); goNext(); }
    });
  });
}

/* ── STAGE 3: team reveal celebration ─────────────────────────────────── */
function bootRenderTeamReveal(){
  bootEnsure();
  const companyName = (companyState && companyState.name) ? companyState.name : (_BOOT_WIZ.name || '당신의 회사');
  /* Pull the agents we already know about from agentMap (populated by
     corporateReady). If empty (early init), ask host to send them. */
  let agents = Object.values(agentMap || {});
  if(!agents.length){
    /* Defer briefly — agentMap usually fills within ms after corporateReady. */
    setTimeout(bootRenderTeamReveal, 200);
    return;
  }
  /* CEO first, then the rest in role order. */
  agents = agents.slice().sort((a,b)=>{
    if(a.id==='ceo') return -1;
    if(b.id==='ceo') return 1;
    return 0;
  });
  let cards = '';
  for(let i=0;i<agents.length;i++){
    const a = agents[i];
    const live = a.id === 'ceo';
    const tag = live
      ? '<span class="btc-active">● Active</span>'
      : '<span class="btc-pending">Coming Soon</span>';
    cards += '<div class="boot-team-card" data-i="' + i + '" style="--ag-color:' + a.color + ';--ag-color-glow:' + a.color + '55">'
          +   '<span class="btc-emoji">' + a.emoji + '</span>'
          +   '<span class="btc-name">' + esc(a.name) + '</span>'
          +   '<span class="btc-role">' + esc(a.role || '') + '</span>'
          +   tag
          + '</div>';
  }
  bootSetContent(
    '<div class="boot-head">'
    +   '<div class="boot-tag"><span class="boot-tag-dot"></span>STAGE 3 / 3 · TEAM ASSEMBLY</div>'
    +   '<div class="boot-h1"><span class="accent">' + esc(companyName) + '</span>의<br>팀이 자리를 잡았습니다</div>'
    +   '<div class="boot-sub">CEO가 회사 목표를 읽고 적절한 에이전트에게 작업을 분배합니다. 24시간 업무 모드를 켜두면 자리를 비울 때도 자동으로 일해요.</div>'
    + '</div>'
    + '<div class="boot-body">'
    +   '<div class="boot-team-status" id="bootTeamStatus">팀 합류 중…</div>'
    +   '<div class="boot-team-grid" id="bootTeamGrid">' + cards + '</div>'
    + '</div>'
    + '<div class="boot-foot">'
    +   '<button class="boot-btn ghost" id="bootSkipReveal">건너뛰기</button>'
    +   '<span class="boot-spacer"></span>'
    +   '<button class="boot-btn primary" id="bootEnterOffice" disabled>🏢 사무실 입장 →</button>'
    + '</div>'
  );
  const grid = document.getElementById('bootTeamGrid');
  const statusEl = document.getElementById('bootTeamStatus');
  const enterBtn = document.getElementById('bootEnterOffice');
  const cardsEls = grid ? grid.querySelectorAll('.boot-team-card') : [];
  /* Stagger reveal */
  cardsEls.forEach((c, i)=>{
    setTimeout(()=>{
      c.classList.add('in');
      if(statusEl){
        statusEl.textContent = (i + 1) + ' / ' + cardsEls.length + ' 합류 — ' + agents[i].emoji + ' ' + agents[i].name;
      }
    }, 220 + i * 140);
  });
  /* Once everyone is in, fire celebration + enable enter button */
  setTimeout(()=>{
    if(statusEl) statusEl.textContent = '✨ 팀 합류 완료';
    if(enterBtn) enterBtn.disabled = false;
    bootBurstParticles();
  }, 220 + cardsEls.length * 140 + 250);

  document.getElementById('bootSkipReveal').addEventListener('click', ()=>{
    bootClose();
    /* Open office immediately */
    vscode.postMessage({ type:'toggleOffice' });
  });
  enterBtn.addEventListener('click', ()=>{
    bootClose();
    vscode.postMessage({ type:'toggleOffice' });
  });
}

function applyCompanyState(s){
  if(!s)return;
  companyState.configured=!!s.configured;
  companyState.name=s.companyName||'';
  companyState.dir=s.companyDir||'';
  companyState.folderExists=!!s.folderExists;
  companyState.brainExplicitlySet=!!s.brainExplicitlySet;
  /* DAY 카운터를 host가 계산한 실제 경과일로 동기화 */
  if(typeof s.companyDay === 'number' && s.companyDay > 0){
    hudDayNum = s.companyDay;
    const dayEl = document.getElementById('hudDay');
    if(dayEl) dayEl.textContent = hudDayNum;
  }
  /* Company configured → onboarding is implicitly done. Auto-dismiss any
     lingering 4-step onboarding card so the welcome screen is clean. */
  if(companyState.configured && onboardingState && !onboardingState.dismissed){
    onboardingState.dismissed=true;
    const root=document.getElementById('onboardRoot');if(root)root.innerHTML='';
    try{vscode.postMessage({type:'dismissOnboarding'});}catch{}
  }
  /* 헤더 — 기업 모드일 때 회사명 OR "1인 기업" fallback 뱃지 */
  if(brandSuffix){
    if(companyState.name){
      brandSuffix.textContent='👔 '+companyState.name;
      brandSuffix.classList.add('has-name');
    } else {
      brandSuffix.textContent='👔 1인 기업';
      brandSuffix.classList.remove('has-name');
    }
  }
  /* 에이전트 보드 헤더 */
  if(abCompanyName)abCompanyName.textContent=companyState.name||'AI 1인 기업';
  if(abFolderText)abFolderText.textContent=companyState.dir||'미설정';
}

/* Mini emoji dots — visible in collapsed mode, mirror full cards' state. */
let agentMiniDotEls={};
/* v2.89.106 — 채용 상태 단일 진실 소스 = backend `_company/_shared/hired.json`.
   v2.89.107 — 활성/비활성 토글 시스템 추가 (Option B). 상태 두 가지:
     - locked (Luna): PIN 0000 통과해야 활성. 미통과면 카드 보라색 + 자물쇠
     - inactive (instagram, business, developer, researcher): 사용자 OPT-IN 필요.
       기본 비활성, 카드 회색. 클릭 시 confirm → 활성화.
     - always-on (CEO, secretary, youtube, writer, designer): 항상 활성.
   두 화면 (사이드바·대쉬보드) 어디서든 같은 정보를 봄. */
const LOCKED_AGENTS = { editor: true };  /* 사운드 디렉터(editor=루나) — PIN 게이트 */
/* v2.89.110 — 자율성 + 합리적 기본값:
   - ALWAYS_ON (1명): CEO 시스템 필수
   - DEFAULT_ON (4명): 새 사용자 첫 진입 시 자동 활성화 (사용자 OFF 가능)
   - OPTIONAL (4명): 기본 비활성, opt-in
   - LOCKED (1명): Luna PIN
   첫 화면이 "비어 있지 않게" 하면서도 사용자 선택권 유지. */
const ALWAYS_ON_AGENTS = new Set(['ceo']);
const DEFAULT_ON_AGENTS = new Set(['secretary','youtube','writer','designer']);
const OPTIONAL_AGENTS = new Set(['secretary','youtube','writer','designer','instagram','business','developer','researcher']);
let _backendHiredAgents = null;  /* backend 동기화. null = 미수신 */
let _backendActiveAgents = null;  /* v2.89.107 active.json 동기화 */

function isAgentHired(id){
  if(!LOCKED_AGENTS[id]) return true;
  if (_backendHiredAgents && typeof _backendHiredAgents === 'object') {
    return !!_backendHiredAgents[id];
  }
  /* fallback: localStorage (backend 도달 전 즉시 반영) */
  try { return localStorage.getItem('connectai_hired_'+id) === '1'; } catch { return false; }
}
function markAgentHired(id){
  try { localStorage.setItem('connectai_hired_'+id, '1'); } catch { /* private mode */ }
  if (!_backendHiredAgents) _backendHiredAgents = {};
  _backendHiredAgents[id] = { hiredAt: new Date().toISOString() };
}

/* v2.89.107 — 핵심 helper: 에이전트가 사용 가능한가 */
function isAgentActive(id){
  if (ALWAYS_ON_AGENTS.has(id)) return true;
  if (LOCKED_AGENTS[id]) return isAgentHired(id);
  if (OPTIONAL_AGENTS.has(id)) {
    if (_backendActiveAgents && typeof _backendActiveAgents === 'object') {
      return !!_backendActiveAgents[id];
    }
    /* backend 도달 전 임시 default — 초보 사용자엔 OFF, 기존 사용자엔 ON
       (backend 도달하면 정확한 상태로 즉시 갱신) */
    return false;
  }
  return true;
}
function isAgentTogglable(id){
  return OPTIONAL_AGENTS.has(id) || !!LOCKED_AGENTS[id];
}
function renderAgentBoard(agents,companyDir){
  agentMap={};agentCardEls={};agentMiniDotEls={};
  abGrid.innerHTML='';
  const miniStrip=document.getElementById('abMiniStrip');
  if(miniStrip)miniStrip.innerHTML='';
  if(companyDir){const t=document.getElementById('abFolderText');if(t)t.textContent=companyDir;}
  agents.forEach(a=>{
    agentMap[a.id]=a;
    const card=document.createElement('div');
    /* v2.89.107 — 3-way state: locked (PIN) > inactive (toggle) > idle (active) */
    const locked = LOCKED_AGENTS[a.id] && !isAgentHired(a.id);
    const inactive = !locked && OPTIONAL_AGENTS.has(a.id) && !isAgentActive(a.id);
    const stateClass = locked ? 'locked' : (inactive ? 'inactive' : 'idle');
    card.className='ab-card '+stateClass;
    card.style.setProperty('--ag-color',a.color);
    card.style.setProperty('--ag-color-glow',a.color+'33');
    card.dataset.agent=a.id;
    const statusText = locked
      ? '입사 준비 중'
      : (inactive ? '비활성 (클릭해서 ON)' : (AGENT_LIVE[a.id] ? '' : '곧 합류'));
    const portraitHtml = (a.portraitIsCustom && a.portrait)
      ? '<img class="ab-portrait" src="'+a.portrait+'" alt="" />'
      : '<div class="ab-emoji">'+a.emoji+'</div>';
    const lockBadge = locked
      ? '<span class="ab-lock-icon">🔒</span>'
      : (inactive ? '<span class="ab-lock-icon ab-inactive-icon" style="color:rgba(255,255,255,.65);text-shadow:0 0 6px rgba(255,255,255,.3)">⏸</span>' : '');
    card.innerHTML=lockBadge+'<span class="ab-led"></span>'+portraitHtml+'<div class="ab-name">'+a.name+'</div><div class="ab-status"'+(statusText?'':' style="display:none"')+'>'+statusText+'</div>';
    card.addEventListener('click',()=>{
      if (LOCKED_AGENTS[a.id] && !isAgentHired(a.id)) {
        openHirePin(a);
      } else if (OPTIONAL_AGENTS.has(a.id) && !isAgentActive(a.id)) {
        if (confirm(`${a.emoji} ${a.name}\n\n이 에이전트를 활성화할까요?\nCEO가 작업 분배 시 호출할 수 있습니다.\n언제든 다시 비활성화 가능.`)) {
          vscode.postMessage({ type:'setAgentActive', agent: a.id, active: true });
        }
      } else {
        showAgentPanel(a);
      }
    });
    abGrid.appendChild(card);
    agentCardEls[a.id]=card;
    /* Mini dot for the collapsed strip — clickable and stops the header
       collapse from firing. */
    if(miniStrip){
      const dot=document.createElement('span');
      dot.className='ab-mini-dot idle';
      dot.style.setProperty('--ag-color',a.color);
      dot.style.setProperty('--ag-color-glow',a.color+'66');
      dot.dataset.agent=a.id;
      dot.title=a.emoji+' '+a.name;
      dot.textContent=a.emoji;
      dot.addEventListener('click',(e)=>{
        e.stopPropagation();
        showAgentPanel(a);
      });
      miniStrip.appendChild(dot);
      agentMiniDotEls[a.id]=dot;
    }
  });
}

/* v2.89.95 — 채용 PIN 모달. 힌트 표시 절대 안 함 (사용자 요구).
   디지털 4자리 입력, 자동 다음 칸, 마지막 자리 입력 시 자동 검증. */
const HIRE_PIN = '0000';
let _pinOverlayEl = null;
function openHirePin(agent){
  if(_pinOverlayEl) return;  /* dedupe */
  const overlay = document.createElement('div');
  overlay.className = 'pin-overlay';
  overlay.innerHTML =
    '<div class="pin-card">'+
      '<div class="pin-brand">CONNECT · AI HR</div>'+
      '<div class="pin-icon">'+(agent.emoji||'🎵')+'</div>'+
      '<div class="pin-title">'+(agent.name||'에이전트')+' 채용</div>'+
      '<div class="pin-sub">입사 승인 코드를 입력하세요.</div>'+
      '<div class="pin-input-row">'+
        '<input class="pin-digit" type="tel" inputmode="numeric" maxlength="1" autocomplete="off" />'+
        '<input class="pin-digit" type="tel" inputmode="numeric" maxlength="1" autocomplete="off" />'+
        '<input class="pin-digit" type="tel" inputmode="numeric" maxlength="1" autocomplete="off" />'+
        '<input class="pin-digit" type="tel" inputmode="numeric" maxlength="1" autocomplete="off" />'+
      '</div>'+
      '<div class="pin-status" id="pinStatus">대기 중…</div>'+
      '<button class="pin-cancel" id="pinCancel">취소</button>'+
    '</div>';
  document.body.appendChild(overlay);
  _pinOverlayEl = overlay;
  const digits = overlay.querySelectorAll('.pin-digit');
  const status = overlay.querySelector('#pinStatus');
  const close = ()=>{ try{ overlay.remove(); }catch{} _pinOverlayEl=null; };
  /* 입력 흐름 — 한 칸 입력하면 다음 칸으로, 백스페이스면 이전 칸으로 */
  digits.forEach((d, i)=>{
    d.addEventListener('input', (e)=>{
      const v = (e.target.value||'').replace(/\D/g,'').slice(-1);
      e.target.value = v;
      if(v){
        e.target.classList.add('filled');
        if(i < digits.length-1) digits[i+1].focus();
        else verify();
      } else {
        e.target.classList.remove('filled');
      }
    });
    d.addEventListener('keydown', (e)=>{
      if(e.key==='Backspace' && !e.target.value && i>0){
        digits[i-1].focus();
        digits[i-1].value='';
        digits[i-1].classList.remove('filled');
      } else if(e.key==='Escape'){
        close();
      } else if(e.key==='Enter'){
        verify();
      }
    });
  });
  function verify(){
    const code = Array.from(digits).map(d=>d.value).join('');
    if(code.length < 4){
      status.textContent='4자리 입력하세요';
      status.className='pin-status err';
      return;
    }
    if(code === HIRE_PIN){
      status.textContent='✓ 인증 완료 — 환영합니다';
      status.className='pin-status ok';
      digits.forEach(d=>d.disabled=true);
      markAgentHired(agent.id);
      /* v2.89.106 — backend에 PIN 같이 전송. backend에서 재검증 후 hired.json 영구 저장. */
      try { vscode.postMessage({ type:'agentHired', agent: agent.id, pin: code }); } catch {}
      setTimeout(()=>{
        close();
        /* 카드를 다시 그리지 않고도 즉시 반영 — 잠금 해제 + 패널 자동 오픈 */
        const card = agentCardEls[agent.id];
        if(card){
          card.classList.remove('locked');
          card.classList.add('idle');
          const lock = card.querySelector('.ab-lock-icon');
          if(lock) lock.remove();
          const st = card.querySelector('.ab-status');
          if(st){ st.textContent=''; st.style.display='none'; }
        }
        /* 채용 직후 패널 열어서 즉시 사용 가능 안내 */
        try { showAgentPanel(agent); } catch {}
      }, 600);
    } else {
      status.textContent='❌ 잘못된 코드';
      status.className='pin-status err';
      digits.forEach(d=>{
        d.classList.add('error');
        d.value='';
        d.classList.remove('filled');
      });
      setTimeout(()=>{
        digits.forEach(d=>d.classList.remove('error'));
        digits[0].focus();
        status.textContent='다시 시도';
        status.className='pin-status';
      }, 600);
    }
  }
  overlay.querySelector('#pinCancel').addEventListener('click', close);
  overlay.addEventListener('click', (e)=>{ if(e.target===overlay) close(); });
  setTimeout(()=>digits[0].focus(), 80);
}

function setCardState(agent,state,task){
  const c=agentCardEls[agent];if(!c)return;
  /* v2.89.95 — 잠긴 카드는 상태 변경 무시 (CEO가 dispatch 시도해도 시각 변화 없음) */
  if(c.classList.contains('locked')) return;
  c.classList.remove('idle','thinking','working','done');
  c.classList.add(state);
  const s=c.querySelector('.ab-status');
  if(s){
    if(state==='idle'){
      const t=AGENT_LIVE[agent] ? '' : '곧 합류';
      s.textContent=t;
      s.style.display=t?'':'none';
    } else {
      s.style.display='';
      if(state==='thinking')s.textContent='THINKING';
      else if(state==='working')s.textContent='WORKING';
      else if(state==='done')s.textContent='DONE';
    }
  }
  const dot=agentMiniDotEls[agent];
  if(dot){
    dot.classList.remove('idle','thinking','working','done');
    dot.classList.add(state);
  }
  /* 작업 라벨 toast */
  const old=c.querySelector('.ab-task-toast');if(old)old.remove();
  if(task && (state==='working'||state==='thinking')){
    const t=document.createElement('div');t.className='ab-task-toast';t.textContent=task;
    c.appendChild(t);
    setTimeout(()=>{if(t.parentNode)t.style.opacity='0.0';setTimeout(()=>t.remove(),400);},2400);
  }
}

function resetAllAgentCards(){
  Object.keys(agentCardEls).forEach(id=>setCardState(id,'idle'));
  if(abSvg)abSvg.innerHTML='';
}

function drawDispatchBeams(taskAgentIds){
  if(!abSvg||!agentCardEls.ceo)return;
  abSvg.innerHTML='';
  const board=abGrid.getBoundingClientRect();
  const ceoR=agentCardEls.ceo.getBoundingClientRect();
  const cx=ceoR.left+ceoR.width/2-board.left;
  const cy=ceoR.top+ceoR.height/2-board.top;
  const w=abGrid.clientWidth,h=abGrid.clientHeight;
  abSvg.setAttribute('viewBox','0 0 '+w+' '+h);
  abSvg.setAttribute('width',w);abSvg.setAttribute('height',h);
  taskAgentIds.forEach((id,i)=>{
    const card=agentCardEls[id];if(!card||id==='ceo')return;
    const r=card.getBoundingClientRect();
    const tx=r.left+r.width/2-board.left;
    const ty=r.top+r.height/2-board.top;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    /* curved beam */
    const mx=(cx+tx)/2,my=(cy+ty)/2-12;
    path.setAttribute('d','M '+cx+' '+cy+' Q '+mx+' '+my+' '+tx+' '+ty);
    path.setAttribute('class','ab-beam dispatching');
    const a=agentMap[id];if(a){path.style.stroke=a.color;path.style.filter='drop-shadow(0 0 6px '+a.color+')';}
    path.style.animationDelay=(i*0.08)+'s';
    abSvg.appendChild(path);
  });
}

function startAgentMsg(agent,task){
  const a=agentMap[agent];if(!a)return;
  leaveInitState();
  if(agentStreamEls[agent]){endAgentMsg(agent);}
  const el=document.createElement('div');el.className='msg msg-agent streaming';
  el.style.setProperty('--ag-color',a.color);
  el.style.setProperty('--ag-color-glow',a.color+'40');
  const head=document.createElement('div');head.className='msg-head';
  const safeTask=esc(task||'').slice(0,80);
  head.innerHTML='<div class="av">'+a.emoji+'</div><span class="ag-tag">'+a.name+'</span><span class="ag-task">'+safeTask+'</span><span class="ag-elapsed" id="ge-'+agent+'-'+Date.now()+'">0:00</span>';
  const elapsedEl=head.querySelector('.ag-elapsed');
  const body=document.createElement('div');body.className='msg-body';
  el.appendChild(head);el.appendChild(body);chat.appendChild(el);scrollChatToBottomIfNear();
  const startedAt=Date.now();
  const tick=setInterval(()=>{
    if(!el.parentNode){clearInterval(tick);return;}
    const s=Math.floor((Date.now()-startedAt)/1000);
    if(elapsedEl)elapsedEl.textContent=Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
  },1000);
  agentStreamEls[agent]={el:el,body:body,raw:'',tick:tick};
}

function appendAgentChunk(agent,value){
  let s=agentStreamEls[agent];
  if(!s){startAgentMsg(agent,'');s=agentStreamEls[agent];}
  if(!s)return;
  s.raw=(s.raw||'')+value;
  /* v2.89.56 — 스트리밍 중엔 fmt() 호출 X. 부분 markdown 깨짐 + 코드 placeholder 인덱스
     race 방지. plain text로 escape만 하고 \n→<br/> 만 처리. fmt()는 endAgentMsg에서. */
  const safe = s.raw.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  s.body.innerHTML = safe.replace(/\n/g, '<br/>');
  scrollChatToBottomIfNear();
}

function endAgentMsg(agent){
  const s=agentStreamEls[agent];if(!s)return;
  /* v2.89.56 — 스트리밍 끝났으니 누적 raw에 한 번에 fmt() 적용 → 헤딩·표·인용·리스트 정상 렌더 */
  if(s.body && s.raw) s.body.innerHTML = fmt(s.raw);
  s.el.classList.remove('streaming');
  if(s.tick)clearInterval(s.tick);
  delete agentStreamEls[agent];
}
