.sl-pill{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);color:var(--text-dim);padding:6px 14px;border-radius:20px;font-family:'SF Mono',monospace;font-size:10.5px;letter-spacing:1px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.sl-pill:hover{color:var(--text-bright);border-color:rgba(255,178,102,.3)}
.sl-pill.active{background:rgba(255,178,102,.1);border-color:#FFB266;color:#FFB266;text-shadow:0 0 8px rgba(255,178,102,.5)}
.sl-body{padding:18px 22px 24px;overflow-y:auto;flex:1}
.sl-loading{text-align:center;color:var(--text-dim);font-size:12px;padding:40px 0}
.sl-empty{text-align:center;color:var(--text);font-size:14px;padding:60px 20px;line-height:1.6}
/* v2.89.91 — 공통 empty-state 컴포넌트. 이전엔 산재한 plain-text empty들이
   각자 다른 폰트·여백·구조였음. 한 토큰으로 통일 → 첫인상 일관성·여백 호흡 확보. */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:48px 20px;color:var(--text);gap:10px;animation:emptyFadeIn .4s ease-out}
.empty-state .es-icon{font-size:36px;opacity:.55;line-height:1;margin-bottom:4px;filter:drop-shadow(0 0 14px var(--accent-glow))}
.empty-state .es-title{font-size:14px;font-weight:600;color:var(--text-bright);letter-spacing:-.1px}
.empty-state .es-sub{font-size:12px;color:var(--text-dim);line-height:1.6;max-width:240px}
.empty-state .es-cta{margin-top:10px;font-size:11px;color:var(--accent);background:rgba(0,255,65,.06);border:1px solid rgba(0,255,65,.25);padding:6px 14px;border-radius:8px;font-family:'SF Mono',monospace;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.empty-state .es-cta:hover{background:rgba(0,255,65,.12);box-shadow:0 0 16px var(--accent-glow)}
@keyframes emptyFadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.sl-summary{font-family:'SF Mono',monospace;font-size:11px;color:var(--text-dim);margin-bottom:14px;letter-spacing:.5px}
.sl-summary strong{color:var(--text-bright);font-weight:700}
.sl-group{margin-bottom:18px;background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(0,0,0,.2));border:1px solid rgba(255,255,255,.06);border-left:3px solid var(--ag-color,#5DE0E6);border-radius:12px;padding:12px 14px}
.sl-group-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sl-group-emoji{font-size:18px}
.sl-group-name{font-size:12.5px;font-weight:700;color:var(--text-bright);letter-spacing:.2px}
.sl-group-count{margin-left:auto;font-family:'SF Mono',monospace;font-size:10px;color:var(--text-dim);background:rgba(255,255,255,.04);padding:2px 8px;border-radius:10px}
.sl-group-tools{display:flex;flex-direction:column;gap:6px}
.sl-tool{display:flex;align-items:center;gap:10px;padding:8px 10px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:8px;transition:all .15s}
.sl-tool:hover{background:rgba(255,255,255,.04);border-color:rgba(255,178,102,.2)}
.sl-tool-emoji{font-size:16px;flex-shrink:0;width:24px;text-align:center}
.sl-tool-meta{flex:1;min-width:0}
.sl-tool-name{font-size:12px;color:var(--text-bright);font-weight:600;display:flex;align-items:center;gap:6px}
.sl-tool-desc{font-size:10.5px;color:var(--text-dim);line-height:1.4;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sl-mine{font-family:'SF Mono',monospace;font-size:8px;letter-spacing:1px;color:#FFB266;background:rgba(255,178,102,.1);border:1px solid rgba(255,178,102,.35);padding:1.5px 5px;border-radius:5px;text-transform:uppercase;animation:mineGlow 3s ease-in-out infinite;flex-shrink:0}
/* Single-line desc by default — was 2 lines clamped which made each tool
   row tall. Hover/focus expands to show more if user wants. */
.ap-tool-desc{font-size:10.5px;color:var(--text-dim);line-height:1.4;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;text-overflow:ellipsis;transition:-webkit-line-clamp .25s}
.ap-tool:hover .ap-tool-desc,.ap-tool:focus-within .ap-tool-desc{-webkit-line-clamp:4}
.ap-tool-actions{display:flex;gap:6px;flex-shrink:0;align-items:center}
.ap-tool-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.06);color:var(--text);width:32px;height:32px;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;padding:0;position:relative}
.ap-tool-btn:hover{background:var(--ag-color,var(--accent));color:#000;border-color:transparent}
.ap-tool-btn:active{transform:scale(.92)}
/* ===== Tool card game-like states (v2.48 — running/done/error animations
   kept; left-edge dot disabled in v2.87.4 since the new tile uses a top-right
   corner indicator instead) ===== */
.ap-tool{position:relative;transition:all .2s}
/* Disabled: was the legacy left-edge state dot — replaced by .ap-tool-corner */
.ap-tool::before{content:none}
.ap-tool[data-state="locked"] .ap-tool-btn[data-act="config"]{animation:apToolConfigPulse 2s ease-in-out infinite;border-color:var(--ag-color,var(--accent))}
.ap-tool[data-state="pending"]::before,.ap-tool[data-state="running"]::before{background:var(--ag-color,var(--accent));opacity:1;animation:apToolDotPulse 1.1s ease-in-out infinite}
.ap-tool[data-state="running"]{border-color:var(--ag-color,var(--accent));box-shadow:0 0 0 1px var(--ag-color-glow) inset, 0 6px 20px var(--ag-color-glow)}
.ap-tool[data-state="running"]::after{content:'';position:absolute;inset:-1px;border-radius:inherit;border:1px solid transparent;background:linear-gradient(120deg,transparent 30%,var(--ag-color,var(--accent)) 50%,transparent 70%) border-box;-webkit-mask:linear-gradient(#000 0 0) padding-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;animation:apToolBorderFlow 1.6s linear infinite;pointer-events:none;opacity:.7}
.ap-tool[data-state="done"]{border-color:#4ade80;background:rgba(74,222,128,.06);animation:apToolDonePop .35s ease-out}
.ap-tool[data-state="done"]::before{background:#4ade80;opacity:1;box-shadow:0 0 10px rgba(74,222,128,.6)}
.ap-tool[data-state="error"]{border-color:#f87171;background:rgba(248,113,113,.06)}
.ap-tool[data-state="error"]::before{background:#f87171;opacity:1;box-shadow:0 0 10px rgba(248,113,113,.5)}
.ap-tool.shake{animation:apToolShake .45s cubic-bezier(.36,.07,.19,.97)}
.ap-tool-status{font-family:'SF Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:4px;margin-right:4px;white-space:nowrap;transition:all .25s;opacity:0;max-width:0;overflow:hidden;display:inline-flex;align-items:center}
.ap-tool[data-state="running"] .ap-tool-status,.ap-tool[data-state="pending"] .ap-tool-status,.ap-tool[data-state="done"] .ap-tool-status,.ap-tool[data-state="error"] .ap-tool-status,.ap-tool[data-state="locked"] .ap-tool-status{opacity:1;max-width:90px;padding:2px 6px}
.ap-tool[data-state="locked"] .ap-tool-status{color:#888;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}
.ap-tool[data-state="pending"] .ap-tool-status,.ap-tool[data-state="running"] .ap-tool-status{color:var(--ag-color,var(--accent));background:var(--ag-color-glow);border:1px solid var(--ag-color,var(--accent))}
.ap-tool[data-state="done"] .ap-tool-status{color:#4ade80;background:rgba(74,222,128,.1);border:1px solid #4ade80}
.ap-tool[data-state="error"] .ap-tool-status{color:#f87171;background:rgba(248,113,113,.1);border:1px solid #f87171}
/* Power toggle — replaces the old ▶ run button. Visualizes whether the
   agent will autonomously use this tool. Same visual language as a hardware
   power switch: dimmed/off vs. glowing accent/on. */
.ap-tool-pwr{position:relative;width:44px;height:24px;border-radius:12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);cursor:pointer;padding:0;transition:all .25s;flex-shrink:0;display:inline-flex;align-items:center}
.ap-tool-pwr:hover{border-color:rgba(255,255,255,.18)}
.ap-tool-pwr-dot{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#888;transition:all .25s cubic-bezier(.16,1,.3,1);box-shadow:0 1px 2px rgba(0,0,0,.4)}
.ap-tool-pwr.on{background:var(--ag-color-glow,rgba(0,255,65,.18));border-color:var(--ag-color,var(--accent));box-shadow:0 0 10px var(--ag-color-glow,rgba(0,255,65,.3))}
.ap-tool-pwr.on .ap-tool-pwr-dot{left:22px;background:var(--ag-color,var(--accent));box-shadow:0 0 8px var(--ag-color,var(--accent))}
.ap-tool[data-state="locked"] .ap-tool-pwr{opacity:.4;cursor:not-allowed}
.ap-tool[data-disabled="1"]{opacity:.6}
.ap-tool[data-disabled="1"]::before{background:#666;opacity:.5}
.ap-tool[data-disabled="1"] .ap-tool-emoji{filter:grayscale(.6)}
/* During pending/running the power toggle pulses to confirm activity */
.ap-tool[data-state="pending"] .ap-tool-pwr.on,.ap-tool[data-state="running"] .ap-tool-pwr.on{animation:apToolPwrPulse 1.1s ease-in-out infinite}
@keyframes apToolPwrPulse{0%,100%{box-shadow:0 0 10px var(--ag-color-glow)}50%{box-shadow:0 0 20px var(--ag-color,var(--accent))}}
/* Secondary "테스트 실행" link — small, dim, only visible on row hover.
   Discoverable for testing without competing with the primary power toggle. */
.ap-tool-bottom{display:flex;justify-content:flex-start;margin-top:4px;opacity:0;max-height:0;overflow:hidden;transition:opacity .2s, max-height .2s}
.ap-tool:hover .ap-tool-bottom{opacity:1;max-height:24px}
.ap-tool-test{background:transparent;border:none;color:var(--text-dim);font-size:9.5px;font-family:'SF Mono',monospace;letter-spacing:.5px;cursor:pointer;padding:2px 6px;border-radius:4px;transition:all .15s}
.ap-tool-test:hover{color:var(--ag-color,var(--accent));background:rgba(255,255,255,.04)}
.ap-tool[data-state="pending"] .ap-tool-test,.ap-tool[data-state="running"] .ap-tool-test{color:var(--ag-color,var(--accent));font-weight:600}
@keyframes apToolDotPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.6}}
@keyframes apToolBorderFlow{from{background-position:0 0}to{background-position:200% 0}}
@keyframes apToolShake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(3px)}30%,50%,70%{transform:translateX(-5px)}40%,60%{transform:translateX(5px)}}
@keyframes apToolDonePop{0%{transform:scale(1)}40%{transform:scale(1.02)}100%{transform:scale(1)}}
@keyframes apToolConfigPulse{0%,100%{box-shadow:0 0 0 0 var(--ag-color-glow)}50%{box-shadow:0 0 0 4px var(--ag-color-glow)}}
@keyframes apToolSpin{to{transform:rotate(360deg)}}
/* RAG mode segmented control — educational toggle */
.ap-rag-seg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:6px}
.ap-rag-seg-2{grid-template-columns:1fr 1fr}
.ap-rag-opt{position:relative;padding:10px 8px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:10px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:3px;text-align:left;font-family:inherit;color:var(--text)}
.ap-rag-opt:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.12)}
.ap-rag-opt.on{background:var(--ag-color-glow,rgba(255,182,39,.12));border-color:var(--ag-color,var(--accent));box-shadow:0 0 0 1px var(--ag-color,var(--accent)) inset, 0 4px 14px var(--ag-color-glow,rgba(0,255,65,.18))}
.ap-rag-opt-title{font-size:11.5px;font-weight:700;color:var(--text-bright);letter-spacing:.2px;display:flex;align-items:center;gap:4px}
.ap-rag-opt-tag{font-family:'SF Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--text-dim);background:rgba(255,255,255,.04);padding:1px 5px;border-radius:4px;text-transform:uppercase}
.ap-rag-opt.on .ap-rag-opt-tag{color:var(--ag-color,var(--accent));background:var(--ag-color-glow,rgba(255,182,39,.15));border:1px solid var(--ag-color,var(--accent))}
.ap-rag-opt-desc{font-size:10px;color:var(--text-dim);line-height:1.4}
.ap-rag-saved{font-family:'SF Mono',monospace;font-size:8px;letter-spacing:1.2px;color:var(--ag-color,var(--accent));opacity:0;transition:opacity .25s;margin-left:auto}
.ap-rag-saved.show{opacity:1}
/* Self-RAG user criteria — fold-out under the segmented buttons. Only
   shown when Self-RAG is the active mode (display toggled by JS). */
.ap-rag-criteria{margin-top:10px;padding:10px 12px;background:rgba(0,0,0,.25);border:1px dashed rgba(255,255,255,.08);border-radius:10px;animation:apFadeSlide .3s cubic-bezier(.16,1,.3,1)}
@keyframes apFadeSlide{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.ap-rag-criteria-label{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--text-dim);font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:7px}
.ap-rag-criteria-ta{width:100%;min-height:90px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:9px 11px;font-family:'SF Mono','JetBrains Mono',monospace;font-size:11.5px;line-height:1.55;color:var(--text-bright);resize:vertical;outline:none;box-sizing:border-box;transition:all .2s}
.ap-rag-criteria-ta::placeholder{color:var(--text-dim);opacity:.45;line-height:1.55}
.ap-rag-criteria-ta:focus{border-color:var(--ag-color,var(--accent));background:rgba(0,0,0,.35);box-shadow:0 0 0 2px var(--ag-color-glow,rgba(0,255,65,.1))}
/* Verified-knowledge counter row at the top of the Self-RAG fold-out */
.ap-verified-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:8px 10px;background:rgba(0,204,119,.06);border:1px solid rgba(0,204,119,.18);border-radius:8px}
.ap-verified-meta{flex:1;display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:11px;color:var(--text-bright)}
.ap-verified-icon{color:#00cc77;font-weight:700;font-size:13px;text-shadow:0 0 6px rgba(0,204,119,.6)}
.ap-verified-text{font-weight:700;letter-spacing:.2px}
.ap-verified-count{color:#00cc77;font-family:'SF Mono',monospace;font-weight:800;text-shadow:0 0 4px rgba(0,204,119,.4);min-width:16px;display:inline-block;text-align:center}
.ap-verified-help{font-size:10px;color:var(--text-dim);font-weight:400;letter-spacing:0;flex-basis:100%;margin-top:2px;line-height:1.45}
.ap-verified-open{background:transparent;border:1px solid rgba(0,204,119,.35);color:#00cc77;font-family:'SF Mono',monospace;font-size:10px;letter-spacing:.5px;padding:5px 9px;border-radius:6px;cursor:pointer;transition:all .15s;flex-shrink:0}
.ap-verified-open:hover{background:rgba(0,204,119,.1);border-color:#00cc77;box-shadow:0 0 10px rgba(0,204,119,.25)}
/* Toggle row */
.ap-toggle-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:10px;cursor:pointer;transition:all .15s}
.ap-toggle-row:hover{background:rgba(255,255,255,0.04)}
.ap-toggle-text{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
.ap-toggle-title{font-size:12.5px;color:var(--text-bright);font-weight:500}
.ap-toggle-sub{font-size:10.5px;color:var(--text-dim);line-height:1.4}
.ap-toggle{position:relative;width:38px;height:22px;border-radius:11px;background:rgba(255,255,255,0.1);transition:all .25s;flex-shrink:0;border:none;padding:0;cursor:pointer}
.ap-toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:all .25s cubic-bezier(.16,1,.3,1)}
.ap-toggle.on{background:var(--ag-color,var(--accent))}
.ap-toggle.on::after{left:19px}
/* Primary action — game-style CTA */
.ap-primary{width:100%;background:linear-gradient(135deg,var(--ag-color,var(--accent)),var(--ag-color,var(--accent)));color:#000;border:none;border-radius:14px;padding:14px 16px;font-size:13.5px;font-weight:700;cursor:pointer;transition:all .25s;letter-spacing:.3px;display:flex;align-items:center;justify-content:center;gap:8px;position:relative;overflow:hidden;box-shadow:0 4px 20px var(--ag-color-glow,rgba(255,182,39,0.2))}
.ap-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(255,255,255,0.2),transparent);opacity:0;transition:opacity .3s}
.ap-primary:hover{transform:translateY(-1px);box-shadow:0 8px 28px var(--ag-color-glow,rgba(255,182,39,0.4))}
.ap-primary:hover::before{opacity:1}
.ap-primary:active{transform:translateY(0)}
.ap-primary:disabled{opacity:0.5;cursor:not-allowed;filter:none;box-shadow:none}
/* Footer link */
.ap-footer{display:flex;align-items:center;justify-content:center;padding-top:2px}
.ap-footer-link{background:none;border:none;color:var(--text-dim);font-size:11px;cursor:pointer;padding:5px 10px;border-radius:6px;transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;gap:4px}
.ap-footer-link:hover{color:var(--text);background:rgba(255,255,255,0.04)}
/* Toast */
.ap-toast{font-size:11px;color:var(--ag-color,var(--accent));text-align:center;min-height:14px;transition:opacity .25s;opacity:0;margin-top:-6px;font-weight:500;letter-spacing:.2px}
.ap-toast.show{opacity:1}
/* Locked state — full-card silhouette layout, no folder access */
.ap-locked-body{padding:0 24px 32px;display:flex;flex-direction:column;align-items:center;gap:16px;position:relative;z-index:2}
.ap-locked-banner{display:inline-flex;align-items:center;gap:8px;padding:8px 18px;border-radius:30px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);font-size:11px;color:var(--text-dim);font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
.ap-locked-banner-dot{width:6px;height:6px;border-radius:50%;background:#A78BFA;box-shadow:0 0 8px #A78BFA}
.ap-locked-msg{font-size:14.5px;color:var(--text-bright);font-weight:600;text-align:center}
.ap-locked-sub{font-size:12px;color:var(--text-dim);line-height:1.6;text-align:center;max-width:300px}
.ap-locked-tip{font-size:11px;color:var(--text-dim);background:rgba(255,182,39,0.06);border:1px solid rgba(255,182,39,0.15);border-radius:10px;padding:10px 14px;text-align:center;line-height:1.5;margin-top:8px}
.ap-locked-tip strong{color:#FFB627}

/* ===== Tool config form (nested modal) ===== */
.tc-backdrop{position:fixed;inset:0;z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:8vh 14px;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);animation:apIn .2s ease-out;overflow-y:auto}
.tc-modal{width:min(440px,94vw);background:linear-gradient(180deg,rgba(20,20,24,0.98),rgba(10,10,12,0.99));border:1px solid rgba(255,255,255,0.1);border-radius:16px;box-shadow:0 24px 60px rgba(0,0,0,0.7);animation:apModalIn .28s cubic-bezier(.16,1,.3,1);overflow:hidden}
.tc-head{display:flex;align-items:flex-start;gap:10px;padding:18px 18px 4px}
.tc-title{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.tc-tool-name{font-size:14px;color:var(--text-bright);font-weight:600;display:flex;align-items:center;gap:6px}
.tc-tool-desc{font-size:11.5px;color:var(--text-dim);line-height:1.5}
.tc-body{padding:14px 18px;display:flex;flex-direction:column;gap:14px;max-height:60vh;overflow-y:auto}
.tc-field{display:flex;flex-direction:column;gap:5px}
.tc-label{font-size:10.5px;color:var(--text-dim);font-weight:600;letter-spacing:.4px;text-transform:uppercase;display:flex;align-items:center;gap:6px;justify-content:space-between}
.tc-label-help{font-size:10px;color:var(--text-dim);opacity:0.7;font-weight:400;text-transform:none;letter-spacing:0}
.tc-input{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:9px;padding:10px 12px;font-family:inherit;font-size:12px;color:var(--text-bright);outline:none;transition:all .2s;box-sizing:border-box}
.tc-input:focus{border-color:var(--accent);background:rgba(0,0,0,0.3)}
.tc-input.password{font-family:'SF Mono',monospace;letter-spacing:.5px}
.tc-list{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:9px;padding:10px 12px;font-family:inherit;font-size:12px;color:var(--text-bright);outline:none;min-height:60px;resize:vertical;transition:all .2s;box-sizing:border-box}
.tc-list:focus{border-color:var(--accent);background:rgba(0,0,0,0.3)}
.tc-actions{display:flex;gap:8px;padding:0 18px 18px}
.tc-btn{flex:1;background:var(--accent);color:#000;border:none;border-radius:10px;padding:11px 14px;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .2s}
.tc-btn:hover{filter:brightness(1.1)}
.tc-btn.secondary{background:rgba(255,255,255,0.06);color:var(--text-bright)}
.tc-btn.secondary:hover{background:rgba(255,255,255,0.1)}
.tc-help{padding:0 18px 14px;font-size:11px;color:var(--text-dim);line-height:1.5}
.tc-help code{background:rgba(255,255,255,0.06);padding:1px 5px;border-radius:4px;font-size:10.5px}

/* ════════════════════════════════════════════════════════════════════════
   BOOT SEQUENCE — cinematic full-overlay onboarding (hero → wizard → team)
   Replaces the inline onboard-card / interview-card chat messages with a
   guided experience that frames the company setup as "your AI company is
   booting up." Stages: folder choice → 3-step wizard → team reveal.
   ──────────────────────────────────────────────────────────────────────── */
/* Force viewport coverage — body's flex column flow drops position:fixed on some Electron builds. */
.boot-backdrop{position:fixed !important;top:0 !important;right:0 !important;bottom:0 !important;left:0 !important;width:100vw !important;height:100vh !important;inset:0;z-index:99997;display:flex !important;align-items:center;justify-content:center;background:radial-gradient(ellipse at top,rgba(0,30,8,.92) 0%,rgba(0,0,0,.97) 70%);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);animation:bootIn .45s ease-out;padding:24px;overflow-y:auto;box-sizing:border-box}
@keyframes bootIn{from{opacity:0}to{opacity:1}}
@keyframes bootOut{from{opacity:1}to{opacity:0}}
.boot-backdrop.closing{animation:bootOut .3s ease-out forwards}
/* Animated grid that pulses behind the content — gives the "booting up" feel */
.boot-backdrop::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,255,65,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,65,.04) 1px,transparent 1px);background-size:42px 42px;opacity:.6;animation:bootGrid 30s linear infinite;pointer-events:none}
@keyframes bootGrid{from{transform:translateY(0)}to{transform:translateY(42px)}}
/* Scan line drifting downward */
.boot-backdrop::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 0,transparent 50%,rgba(0,255,65,.06) 50.2%,transparent 51%);background-size:100% 240px;animation:bootScan 6s linear infinite;pointer-events:none;mix-blend-mode:screen}
@keyframes bootScan{from{background-position:0 -240px}to{background-position:0 100vh}}

.boot-stage{position:relative;width:min(620px,100%);max-height:calc(100vh - 48px);display:flex;flex-direction:column;background:linear-gradient(180deg,rgba(8,12,18,.97),rgba(2,5,8,.99));border:1px solid rgba(0,255,65,.28);border-radius:22px;overflow:hidden;box-shadow:0 30px 100px rgba(0,0,0,.85),0 0 1px rgba(0,255,65,.4),0 0 80px rgba(0,255,65,.18);animation:bootStageIn .6s cubic-bezier(.16,1,.3,1)}
@keyframes bootStageIn{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.boot-stage::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:reportLine 3s ease-in-out infinite}
.boot-stage::after{content:'';position:absolute;top:-180px;left:50%;transform:translateX(-50%);width:520px;height:520px;background:radial-gradient(circle,rgba(0,255,65,.18) 0%,transparent 60%);pointer-events:none;animation:bootAura 8s ease-in-out infinite alternate;opacity:.7;filter:blur(10px)}
@keyframes bootAura{0%{opacity:.5;transform:translateX(-50%) scale(.95)}100%{opacity:.85;transform:translateX(-50%) scale(1.05)}}

/* Stage corner decorations — sci-fi HUD vibe */
.boot-corner{position:absolute;width:22px;height:22px;border:1.5px solid var(--accent);opacity:.7;pointer-events:none}
.boot-corner.tl{top:14px;left:14px;border-right:none;border-bottom:none}
.boot-corner.tr{top:14px;right:14px;border-left:none;border-bottom:none}
.boot-corner.bl{bottom:14px;left:14px;border-right:none;border-top:none}
.boot-corner.br{bottom:14px;right:14px;border-left:none;border-top:none}

.boot-close{position:absolute;top:16px;right:54px;background:transparent;border:none;color:var(--text-dim);font-size:12px;font-family:'SF Mono',monospace;letter-spacing:1px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:all .2s;z-index:5}
.boot-close:hover{color:var(--text-bright);background:rgba(255,255,255,.06)}

/* Header */
.boot-head{padding:38px 36px 6px;text-align:center;position:relative;z-index:2}
.boot-tag{display:inline-flex;align-items:center;gap:8px;font-family:'SF Mono','JetBrains Mono',monospace;font-size:10px;letter-spacing:2.5px;color:var(--accent);text-transform:uppercase;padding:5px 12px;border:1px solid rgba(0,255,65,.3);border-radius:20px;background:rgba(0,255,65,.05);margin-bottom:16px;text-shadow:0 0 8px var(--accent-glow)}
.boot-tag .boot-tag-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:bootBlink 1.4s ease-in-out infinite}
@keyframes bootBlink{0%,100%{opacity:1}50%{opacity:.3}}
.boot-h1{font-size:24px;font-weight:800;color:var(--text-bright);letter-spacing:-.5px;line-height:1.25;margin-bottom:8px;text-shadow:0 0 20px rgba(0,255,65,.15)}
.boot-h1 .accent{color:var(--accent);text-shadow:0 0 12px var(--accent-glow)}
.boot-sub{font-size:13px;color:var(--text-dim);line-height:1.6;max-width:440px;margin:0 auto;font-weight:400}

/* Body region — scrollable when content overflows */
.boot-body{padding:22px 36px 18px;overflow-y:auto;flex:1;position:relative;z-index:2}

/* Hero stage — folder choice tiles */
.boot-options{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.boot-opt{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,rgba(255,255,255,.025),rgba(0,255,65,.02));border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px 20px;cursor:pointer;transition:all .3s cubic-bezier(.16,1,.3,1);font-family:inherit;color:var(--text-bright);text-align:left;width:100%;position:relative;overflow:hidden}
.boot-opt::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);transform:scaleY(0);transform-origin:center;transition:transform .3s}
.boot-opt:hover{border-color:var(--accent);background:linear-gradient(135deg,rgba(0,255,65,.06),rgba(0,255,65,.02));transform:translateX(4px);box-shadow:0 6px 20px rgba(0,255,65,.15)}
.boot-opt:hover::before{transform:scaleY(1)}
.boot-opt .bo-icon{font-size:24px;flex-shrink:0;width:42px;height:42px;display:flex;align-items:center;justify-content:center;background:rgba(0,255,65,.06);border:1px solid rgba(0,255,65,.18);border-radius:10px}
.boot-opt .bo-text{display:flex;flex-direction:column;gap:3px;flex:1}
.boot-opt .bo-title{font-size:13.5px;font-weight:700;color:var(--text-bright)}
.boot-opt .bo-desc{font-size:11px;color:var(--text-dim);font-weight:400;line-height:1.5}
.boot-opt .bo-arrow{font-size:14px;color:var(--text-dim);transition:all .25s}
.boot-opt:hover .bo-arrow{color:var(--accent);transform:translateX(3px)}
.boot-opt.recommended{border-color:rgba(0,255,65,.32);background:linear-gradient(135deg,rgba(0,255,65,.05),rgba(0,255,65,.01))}
.boot-opt.recommended .bo-icon{background:rgba(0,255,65,.12);border-color:rgba(0,255,65,.32)}
.boot-opt .bo-recpill{font-family:'SF Mono',monospace;font-size:8.5px;letter-spacing:1.5px;color:var(--accent);background:rgba(0,255,65,.1);border:1px solid rgba(0,255,65,.3);padding:2px 6px;border-radius:8px;text-transform:uppercase;margin-left:6px;align-self:flex-start;margin-top:1px}

/* Wizard stage */
.boot-progress{display:flex;align-items:center;justify-content:center;gap:10px;padding:0 36px 8px;position:relative;z-index:2}
.boot-progress-step{display:flex;align-items:center;gap:8px;font-family:'SF Mono',monospace;font-size:10px;letter-spacing:1.4px;color:var(--text-dim);text-transform:uppercase;transition:color .3s}
.boot-progress-step.active{color:var(--accent);text-shadow:0 0 8px var(--accent-glow)}
.boot-progress-step.done{color:var(--accent2)}
.boot-progress-step .bp-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;border:1.5px solid currentColor;font-size:10px;font-weight:700;transition:all .3s}
.boot-progress-step.active .bp-num{background:var(--accent);color:#000;box-shadow:0 0 12px var(--accent-glow)}
.boot-progress-step.done .bp-num{background:var(--accent2);color:#000;border-color:var(--accent2)}
.boot-progress-line{flex:0 0 28px;height:1.5px;background:var(--border2);transition:background .3s}
.boot-progress-line.done{background:var(--accent)}

.boot-wstep{display:flex;flex-direction:column;gap:14px}
.boot-wstep.exit{animation:wstepOut .25s ease-in forwards}
.boot-wstep.enter{animation:wstepIn .35s cubic-bezier(.16,1,.3,1)}
@keyframes wstepIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes wstepOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-15px)}}

/* Field stagger — each field slides up 70ms apart for cinematic entrance */
.boot-field{display:flex;flex-direction:column;gap:6px;opacity:0;transform:translateY(14px);animation:fieldFadeUp .55s cubic-bezier(.16,1,.3,1) forwards;animation-delay:calc(var(--fi,0) * 70ms + 120ms)}
@keyframes fieldFadeUp{to{opacity:1;transform:translateY(0)}}
.boot-field-label{display:flex;align-items:center;gap:6px;font-size:11px;font-family:'SF Mono',monospace;color:var(--accent);letter-spacing:1.2px;text-transform:uppercase;opacity:.9}
.boot-field-help{font-size:11px;font-family:inherit;color:var(--text-dim);font-weight:400;letter-spacing:0;text-transform:none;margin-left:auto;opacity:.7}

/* Input wrapper — holds the input + the focus beam overlay */
.boot-input-wrap{position:relative;border-radius:11px}
.boot-input,.boot-textarea{width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:11px 14px;font-family:inherit;font-size:14px;color:var(--text-bright);outline:none;transition:all .25s cubic-bezier(.16,1,.3,1);box-sizing:border-box;line-height:1.55;position:relative;z-index:1}
.boot-input::placeholder,.boot-textarea::placeholder{color:var(--text-dim);opacity:.5}
.boot-input:focus,.boot-textarea:focus{border-color:var(--accent);background:rgba(0,0,0,.32);box-shadow:0 0 0 3px rgba(0,255,65,.12),0 0 24px rgba(0,255,65,.22)}
.boot-textarea{min-height:72px;resize:vertical;font-size:13.5px}
/* Sweeping beam across top of focused input */
.boot-input-wrap::after{content:'';position:absolute;left:8%;right:8%;top:-1px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;transform:translateX(-30%);pointer-events:none;border-radius:2px;z-index:2;filter:blur(.5px)}
.boot-input-wrap:focus-within::after{animation:inputBeam 1.6s cubic-bezier(.4,0,.2,1) infinite}
@keyframes inputBeam{0%{opacity:0;transform:translateX(-30%)}30%{opacity:1}70%{opacity:1}100%{opacity:0;transform:translateX(30%)}}

/* Cinematic char-stagger headline — each character fades+rises in sequence */
.boot-h1-char{display:inline-block;opacity:0;transform:translateY(8px);animation:headlineCharIn .5s cubic-bezier(.16,1,.3,1) forwards;animation-delay:calc(var(--ci,0) * 28ms + 60ms);white-space:pre}
.boot-h1-char.space{width:.32em}
@keyframes headlineCharIn{to{opacity:1;transform:translateY(0)}}

/* Liquid progress bar (replaces / augments the dot+line track) */
.boot-progress-bar{position:relative;height:3px;margin:2px 36px 14px;border-radius:2px;background:linear-gradient(90deg,rgba(255,255,255,.06),rgba(255,255,255,.03));overflow:hidden;z-index:2}
.boot-progress-bar::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent));background-size:200% 100%;width:var(--pf,0%);transition:width .55s cubic-bezier(.16,1,.3,1);box-shadow:0 0 14px rgba(0,255,65,.45);animation:progressShimmer 3s linear infinite}
.boot-progress-bar::after{content:'';position:absolute;top:50%;left:var(--pf,0%);transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;background:radial-gradient(circle,var(--accent) 0%,transparent 70%);opacity:.85;transition:left .55s cubic-bezier(.16,1,.3,1);filter:blur(1px)}
@keyframes progressShimmer{from{background-position:0 0}to{background-position:200% 0}}

/* Twinkling starfield behind the boot stage — subtle ambient depth */
.boot-stars{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.boot-stars span{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;opacity:.0;animation:starTwinkle var(--st,8s) ease-in-out infinite;animation-delay:var(--sd,0s);filter:drop-shadow(0 0 3px rgba(255,255,255,.6))}
@keyframes starTwinkle{0%,100%{opacity:0;transform:scale(.4)}50%{opacity:.65;transform:scale(1)}}

/* Footer with nav buttons */
.boot-foot{display:flex;align-items:center;gap:10px;padding:14px 36px 30px;position:relative;z-index:2}
.boot-foot .boot-spacer{flex:1}
.boot-btn{padding:11px 22px;border-radius:11px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .25s;display:inline-flex;align-items:center;gap:8px;letter-spacing:.3px}
.boot-btn.primary{background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);color:#000;box-shadow:0 4px 18px rgba(0,255,65,.28)}
.boot-btn.primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,255,65,.4)}
.boot-btn.primary:active{transform:translateY(0)}
.boot-btn.primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.boot-btn.ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border2)}
.boot-btn.ghost:hover{color:var(--text-bright);border-color:var(--accent);background:rgba(0,255,65,.04)}
.boot-foot-hint{font-size:10.5px;color:var(--text-dim);font-family:'SF Mono',monospace;letter-spacing:.5px}

/* Team reveal stage */
.boot-team-status{font-family:'SF Mono',monospace;font-size:11px;letter-spacing:1.5px;color:var(--accent);text-align:center;margin-bottom:18px;text-transform:uppercase;text-shadow:0 0 8px var(--accent-glow);min-height:14px}
.boot-team-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.boot-team-card{background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(0,0,0,.4));border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:14px 12px 12px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;opacity:0;transform:translateY(14px) scale(.94);position:relative;overflow:hidden}
.boot-team-card.in{animation:teamCardIn .55s cubic-bezier(.16,1,.3,1) forwards}
@keyframes teamCardIn{from{opacity:0;transform:translateY(14px) scale(.94)}to{opacity:1;transform:translateY(0) scale(1)}}
.boot-team-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ag-color,var(--accent));opacity:.5;box-shadow:0 0 12px var(--ag-color,var(--accent))}
.boot-team-card .btc-emoji{font-size:32px;line-height:1;filter:drop-shadow(0 4px 14px var(--ag-color-glow,rgba(0,255,65,.4)));animation:teamEmojiBob 4s ease-in-out infinite}
@keyframes teamEmojiBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.boot-team-card .btc-name{font-family:'SF Mono','JetBrains Mono',monospace;font-size:10.5px;font-weight:700;color:var(--text-bright);letter-spacing:.8px;text-transform:uppercase;margin-top:2px}
.boot-team-card .btc-role{font-size:10px;color:var(--text-dim);line-height:1.4;font-weight:400}
.boot-team-card .btc-active{font-family:'SF Mono',monospace;font-size:8.5px;letter-spacing:1px;color:var(--ag-color,var(--accent));margin-top:4px;padding:2px 7px;border:1px solid var(--ag-color,var(--accent));border-radius:6px;text-transform:uppercase;background:rgba(0,255,65,.04)}
.boot-team-card .btc-pending{font-family:'SF Mono',monospace;font-size:8.5px;letter-spacing:1px;color:var(--text-dim);margin-top:4px;padding:2px 7px;border:1px solid var(--border2);border-radius:6px;text-transform:uppercase;opacity:.6}

/* Wow flash — fired when company is first set up */
@keyframes wowFlash{0%{opacity:0}30%{opacity:.6}100%{opacity:0}}
.boot-flash{position:fixed;inset:0;background:radial-gradient(circle,rgba(0,255,65,.5) 0%,transparent 50%);pointer-events:none;z-index:10000;animation:wowFlash 1s ease-out forwards}

/* Particle burst */
.boot-particles{position:absolute;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.boot-particle{position:absolute;width:3px;height:3px;background:var(--accent);border-radius:50%;box-shadow:0 0 6px var(--accent);opacity:0}
.boot-particle.go{animation:particleFly 1.4s ease-out forwards}
@keyframes particleFly{
  0%{opacity:1;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.2)}
}

/* ════════════════════════════════════════════════════════════════════════
   Telegram setup wizard — twiz-* classes. Replaces the generic ⚙️ form
   for Secretary's telegram_setup tool with a 3-step guided experience.
   ──────────────────────────────────────────────────────────────────────── */
.twiz-stage{position:relative;width:min(560px,100%);max-height:calc(100vh - 48px);background:linear-gradient(180deg,rgba(8,12,18,.97),rgba(2,5,8,.99));border:1px solid rgba(34,154,255,.42);border-radius:20px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 30px 100px rgba(0,0,0,.85),0 0 80px rgba(34,154,255,.18);animation:bootStageIn .55s cubic-bezier(.16,1,.3,1)}
.twiz-stage::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#229affff,transparent);animation:reportLine 3s ease-in-out infinite}
.twiz-content{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0}

.twiz-head{padding:28px 32px 8px;text-align:center}
.twiz-progress{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px}
.twiz-dot{width:26px;height:26px;border-radius:50%;border:1.5px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-family:'SF Mono',monospace;font-size:11px;font-weight:700;color:var(--text-dim);transition:all .3s}
.twiz-dot.active{border-color:#229affff;background:#229affff;color:#000;box-shadow:0 0 14px rgba(34,154,255,.5)}
.twiz-dot.done{border-color:#00cc77;background:#00cc77;color:#000}
.twiz-line{flex:0 0 32px;height:1.5px;background:var(--border2);transition:background .3s}
.twiz-line.done{background:#00cc77}
.twiz-tag{display:inline-block;font-family:'SF Mono','JetBrains Mono',monospace;font-size:10px;letter-spacing:2.2px;color:#229affff;text-transform:uppercase;padding:4px 12px;border:1px solid rgba(34,154,255,.32);border-radius:20px;background:rgba(34,154,255,.06);margin-bottom:14px;text-shadow:0 0 6px rgba(34,154,255,.4)}
.twiz-h1{font-size:22px;font-weight:800;color:var(--text-bright);letter-spacing:-.3px;margin-bottom:8px;line-height:1.25}
.twiz-h1 .accent{color:#229affff;text-shadow:0 0 10px rgba(34,154,255,.45)}
.twiz-sub{font-size:12.5px;color:var(--text-dim);line-height:1.6;max-width:460px;margin:0 auto}

.twiz-body{padding:18px 32px 8px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px}

.twiz-link-btn{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,rgba(34,154,255,.08),rgba(34,154,255,.02));border:1px solid rgba(34,154,255,.32);border-radius:13px;padding:14px 18px;color:var(--text-bright);text-decoration:none;transition:all .25s cubic-bezier(.16,1,.3,1)}
.twiz-link-btn:hover{transform:translateX(3px);background:rgba(34,154,255,.14);box-shadow:0 6px 20px rgba(34,154,255,.2);border-color:#229affff}
.tlb-emoji{font-size:24px;flex-shrink:0;width:42px;height:42px;display:flex;align-items:center;justify-content:center;background:rgba(34,154,255,.1);border:1px solid rgba(34,154,255,.3);border-radius:10px}
.tlb-text{flex:1;display:flex;flex-direction:column;gap:3px}
.tlb-title{font-size:13.5px;font-weight:700}
.tlb-desc{font-size:11px;color:var(--text-dim);line-height:1.5}
.tlb-arrow{color:#229affff;font-size:14px}

.twiz-field{display:flex;flex-direction:column;gap:6px}
.twiz-label{font-family:'SF Mono',monospace;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:#229affff;font-weight:700}
.twiz-input{width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;font-family:'SF Mono','JetBrains Mono',monospace;font-size:13px;color:var(--text-bright);outline:none;box-sizing:border-box;transition:all .2s;letter-spacing:.5px}
.twiz-input::placeholder{color:var(--text-dim);opacity:.45;letter-spacing:0;font-family:inherit}
.twiz-input:focus{border-color:#229affff;background:rgba(0,0,0,.35);box-shadow:0 0 0 3px rgba(34,154,255,.12)}

.twiz-status{font-size:11.5px;color:var(--text-dim);line-height:1.5;padding:6px 4px;letter-spacing:.2px;min-height:18px;transition:color .2s}
.twiz-status.ok{color:#00cc77;text-shadow:0 0 6px rgba(0,204,119,.4)}
.twiz-status.error{color:#ef4444}
.twiz-status.loading{color:#229affff;animation:twizPulse 1.4s ease-in-out infinite}
@keyframes twizPulse{0%,100%{opacity:1}50%{opacity:.55}}

.twiz-detect-row{display:flex;gap:8px;align-items:stretch}
.twiz-detect-row .twiz-input{flex:1}
.twiz-detect-row .twiz-btn{flex-shrink:0;padding:10px 14px;font-size:12px;white-space:nowrap}

.twiz-chat-pick{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.twiz-chat-opt{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:10px;font-family:inherit;color:var(--text-bright);cursor:pointer;transition:all .2s;text-align:left}
.twiz-chat-opt:hover{border-color:#229affff;background:rgba(34,154,255,.08)}
.twiz-chat-opt.on{border-color:#229affff;background:rgba(34,154,255,.14);box-shadow:0 0 0 1px #229affff inset}
.twiz-chat-opt span{font-family:'SF Mono',monospace;font-size:11px;color:var(--text-dim)}

.twiz-summary{background:rgba(34,154,255,.05);border:1px solid rgba(34,154,255,.2);border-radius:11px;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.twiz-summary-row{display:flex;align-items:center;gap:14px;font-size:12px}
.ts-key{font-family:'SF Mono',monospace;font-size:9.5px;letter-spacing:1.5px;color:var(--text-dim);text-transform:uppercase;width:80px;flex-shrink:0}
.ts-val{flex:1;color:var(--text-bright);font-family:'SF Mono',monospace;font-weight:600;word-break:break-all}

.twiz-test-btn{width:100%;padding:18px 22px;background:linear-gradient(135deg,#229affff,#0066cc);color:#fff;border:none;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;font-family:inherit;font-size:14px;font-weight:700;transition:all .25s;box-shadow:0 6px 24px rgba(34,154,255,.32)}
.twiz-test-btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(34,154,255,.5)}
.twiz-test-btn:active{transform:translateY(0)}
.tt-icon{font-size:20px}

.twiz-foot{display:flex;align-items:center;gap:10px;padding:14px 32px 24px;border-top:1px solid rgba(255,255,255,.04)}
.twiz-foot .twiz-spacer{flex:1}
.twiz-btn{padding:11px 20px;border-radius:11px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .25s;display:inline-flex;align-items:center;gap:6px}
.twiz-btn.primary{background:linear-gradient(135deg,#229affff,#0066cc);color:#fff;box-shadow:0 4px 16px rgba(34,154,255,.3)}
.twiz-btn.primary:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(34,154,255,.45)}
.twiz-btn.primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.twiz-btn.ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border2)}
.twiz-btn.ghost:hover{color:var(--text-bright);border-color:#229affff;background:rgba(34,154,255,.06)}

/* Company setup edit modal — reuses the tc-* visual language. Brand badge
   click opens this so users can edit name / goals / needs without digging
   into _shared/ files. */
.cs-backdrop{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.78);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);animation:apIn .25s ease-out;padding:20px}
.cs-modal{width:min(460px,100%);max-height:92vh;display:flex;flex-direction:column;background:linear-gradient(180deg,rgba(20,20,26,0.98),rgba(8,8,12,0.99));border:1px solid rgba(255,255,255,0.06);border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,0.7),0 0 50px rgba(0,255,65,.15);animation:apModalIn .35s cubic-bezier(.16,1,.3,1);overflow:hidden;position:relative}
.cs-head{display:flex;align-items:center;gap:10px;padding:18px 20px 6px}
.cs-head-emoji{font-size:22px}
.cs-head-title{font-family:'SF Mono','JetBrains Mono',monospace;font-size:11px;letter-spacing:1.5px;color:var(--accent);font-weight:700;text-transform:uppercase;text-shadow:0 0 8px var(--accent-glow)}
.cs-head-sub{font-size:11.5px;color:var(--text-dim);margin-top:1px}
.cs-close{margin-left:auto;background:transparent;border:none;color:var(--text-dim);font-size:22px;line-height:1;cursor:pointer;padding:4px 8px;border-radius:6px;transition:all .2s}
.cs-close:hover{background:rgba(255,255,255,0.06);color:var(--text-bright)}
.cs-body{padding:6px 20px 8px;overflow-y:auto;display:flex;flex-direction:column;gap:11px}
.cs-section{display:flex;flex-direction:column;gap:6px}
.cs-section-label{font-size:9.5px;font-family:'SF Mono',monospace;color:var(--accent);letter-spacing:1.2px;text-transform:uppercase;opacity:.85}
.cs-section-help{font-size:10.5px;color:var(--text-dim);font-weight:400;letter-spacing:0;text-transform:none;margin-left:6px;opacity:.7}
.cs-input{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:9px;padding:10px 12px;font-family:inherit;font-size:12.5px;color:var(--text-bright);outline:none;transition:all .2s;box-sizing:border-box}
.cs-input:focus{border-color:var(--accent);background:rgba(0,0,0,0.3);box-shadow:0 0 12px var(--accent-glow)}
.cs-textarea{width:100%;min-height:60px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:9px;padding:10px 12px;font-family:inherit;font-size:12.5px;color:var(--text-bright);outline:none;resize:vertical;transition:all .2s;box-sizing:border-box;line-height:1.5}
.cs-textarea:focus{border-color:var(--accent);background:rgba(0,0,0,0.3);box-shadow:0 0 12px var(--accent-glow)}
.cs-actions{display:flex;gap:8px;padding:14px 20px 20px}
.cs-btn{flex:1;background:var(--accent);color:#000;border:none;border-radius:10px;padding:11px 14px;font-size:12.5px;font-weight:700;cursor:pointer;transition:all .2s}
.cs-btn:hover{filter:brightness(1.1)}
.cs-btn.secondary{background:rgba(255,255,255,0.06);color:var(--text-bright)}
.cs-btn.secondary:hover{background:rgba(255,255,255,0.1)}
.cs-saved{font-size:11px;color:#00cc77;text-align:center;padding:0 20px 4px;opacity:0;transition:opacity .25s}
.cs-saved.show{opacity:1}
/* Brand badge becomes interactive so users discover the editor */
.brand-suffix{cursor:pointer}
.brand-suffix:hover{background:rgba(0,255,65,.08)}

/* ===========================================================================
   v2.89.116 — Specialist Dock (1인 기업 모드 모델 오케스트레이션 인-라인)
   ----------------------------------------------------------------------------
   일반 모드: 헤더의 #modelSel만 표시 (단일 드롭다운).
   기업 모드(body.corp-on): 헤더의 #modelSel 자리를 9명 specialist 카드 dock으로
   대체. 가로 스크롤 한 줄 + 끝에 ⚡자동 / 🔁같게 액션 버튼. 카드 클릭 시
   인라인 popover로 모델 변경. dashboard의 "모델 오케스트레이션" 모달과 동일
   백엔드(_autoOrchestrateModelMap, writeAgentModelMap)를 공유해 항상 같은 진실.

   디자인: 골드 럭셔리 톤(#FBBF24) + 무광 검정 베이스 + 부드러운 glow + 카드
   hover 시 lift. 사이드바 폭 좁아도 자연스러운 가로 스크롤.
   =========================================================================== */
/* v2.89.117 — Drawer 패턴. 평소엔 헤더의 단일 칩(.ad-chip) 하나만 보이고,
   클릭하면 9명 dock이 슬라이드 다운으로 펼쳐짐. 시각 노이즈 최소화 +
   오케스트레이션 코어는 100% 유지(자동/같게/카드별 매핑 popover 그대로). */
body.corp-on #modelSel{display:none}
.ad-chip{display:none}
body.corp-on .ad-chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 8px;border-radius:6px;
  background:transparent;
  border:1px solid rgba(251,191,36,.28);color:#fef3c7;
  font-size:11px;font-weight:500;cursor:pointer;
  transition:border-color .18s,background .18s;
  white-space:nowrap;max-width:200px;
  font-family:'SF Mono','JetBrains Mono',monospace;
}
.ad-chip:hover{border-color:rgba(251,191,36,.6);background:rgba(251,191,36,.06)}
.ad-chip[data-expanded="true"]{border-color:#FBBF24;background:rgba(251,191,36,.10)}
.ad-chip .adc-model{
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;
  letter-spacing:.1px;color:#fef3c7;
}
.ad-chip .adc-model.mixed{
  font-style:italic;color:rgba(251,191,36,.85);
  /* 혼합일 때만 시각적으로 일반 select와 미묘하게 다르게 — "여러 모델 쓰고 있구나" 신호 */
}
.ad-chip[data-mixed="true"]{border-color:rgba(251,191,36,.45)}
.ad-chip .adc-caret{font-size:8px;opacity:.55;transition:transform .25s cubic-bezier(.16,1,.3,1)}
.ad-chip[data-expanded="true"] .adc-caret{transform:rotate(180deg);opacity:.9}
.ad-chip .adc-warn{
  width:5px;height:5px;border-radius:50%;background:#ef4444;
  box-shadow:0 0 4px rgba(239,68,68,.6);animation:warnPulse 1.6s ease-in-out infinite;
  flex:0 0 auto;
}

.agent-dock{display:none}
body.corp-on .agent-dock[data-open="true"]{
  display:flex;align-items:stretch;gap:6px;
  padding:8px 10px 10px;
  background:linear-gradient(180deg,rgba(20,16,8,.95) 0%,rgba(8,6,4,.98) 100%);
  border-bottom:1px solid rgba(251,191,36,.18);
  position:relative;
  animation:dockSlideIn .45s cubic-bezier(.16,1,.3,1);
}
body.corp-on .agent-dock::before{
  content:'';position:absolute;left:0;right:0;top:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,rgba(251,191,36,.55) 30%,rgba(251,191,36,.85) 50%,rgba(251,191,36,.55) 70%,transparent 100%);
  animation:dockTopShimmer 4s ease-in-out infinite;
}
@keyframes dockSlideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes dockTopShimmer{0%,100%{opacity:.6}50%{opacity:1}}

.ad-rail{
  flex:1 1 auto;display:flex;gap:6px;overflow-x:auto;overflow-y:hidden;
  scroll-behavior:smooth;scrollbar-width:thin;
  scrollbar-color:rgba(251,191,36,.25) transparent;
  padding:2px 2px 4px;mask-image:linear-gradient(90deg,transparent 0,#000 8px,#000 calc(100% - 8px),transparent 100%);
}
.ad-rail::-webkit-scrollbar{height:4px}
.ad-rail::-webkit-scrollbar-thumb{background:rgba(251,191,36,.3);border-radius:2px}
.ad-rail::-webkit-scrollbar-thumb:hover{background:rgba(251,191,36,.55)}

.ag-card{
  flex:0 0 auto;display:flex;align-items:center;gap:8px;
  padding:6px 10px 6px 6px;min-width:144px;max-width:200px;
  background:linear-gradient(135deg,rgba(40,30,12,.85) 0%,rgba(20,15,6,.92) 100%);
  border:1px solid rgba(251,191,36,.22);border-radius:10px;
  cursor:pointer;position:relative;
  transition:transform .18s cubic-bezier(.16,1,.3,1),border-color .2s,box-shadow .2s,background .2s;
  user-select:none;
}
.ag-card:hover{
  transform:translateY(-2px);
  border-color:rgba(251,191,36,.55);
  background:linear-gradient(135deg,rgba(60,42,14,.92) 0%,rgba(28,20,8,.96) 100%);
  box-shadow:0 6px 18px rgba(0,0,0,.5),0 0 14px rgba(251,191,36,.25),inset 0 1px 0 rgba(255,255,255,.06);
}
.ag-card.editing{
  border-color:#FBBF24;
  box-shadow:0 0 0 1px rgba(251,191,36,.35),0 8px 24px rgba(251,191,36,.22),inset 0 0 18px rgba(251,191,36,.08);
  transform:translateY(-2px);
}
.ag-card .ag-emoji{
  width:30px;height:30px;flex:0 0 30px;
  display:flex;align-items:center;justify-content:center;font-size:16px;
  border-radius:8px;
  background:linear-gradient(135deg,rgba(251,191,36,.18) 0%,rgba(245,158,11,.08) 100%);
  border:1px solid rgba(251,191,36,.28);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
  position:relative;
}
.ag-card .ag-emoji::after{
  content:'';position:absolute;inset:0;border-radius:8px;
  background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.12) 0%,transparent 60%);
  pointer-events:none;
}
.ag-card .ag-text{display:flex;flex-direction:column;min-width:0;flex:1 1 auto;line-height:1.15}
.ag-card .ag-name{
  font-size:11.5px;font-weight:600;color:#fef3c7;letter-spacing:.2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.ag-card .ag-model{
  font-size:9.5px;color:rgba(251,191,36,.78);
  font-family:'SF Mono','JetBrains Mono',monospace;letter-spacing:.1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  display:flex;align-items:center;gap:3px;
}
.ag-card .ag-model::after{
  content:'▾';font-family:inherit;opacity:.6;font-size:8px;flex:0 0 auto;
}
.ag-card[data-using-default="true"] .ag-model{color:rgba(251,191,36,.5);font-style:italic}
.ag-card[data-using-default="true"] .ag-model::before{content:'(default) ';opacity:.7}
.ag-card[data-status="warn"]::before{
  content:'';position:absolute;top:5px;right:5px;width:6px;height:6px;border-radius:50%;
  background:#ef4444;box-shadow:0 0 6px rgba(239,68,68,.7);
  animation:warnPulse 1.6s ease-in-out infinite;
}
@keyframes warnPulse{0%,100%{opacity:.7}50%{opacity:1}}

.ad-actions{display:flex;flex:0 0 auto;gap:4px;align-items:stretch;padding-left:6px;border-left:1px solid rgba(251,191,36,.18)}
.ad-btn{
  font-size:11px;font-weight:600;letter-spacing:.2px;
  padding:6px 10px;border-radius:9px;cursor:pointer;
  background:linear-gradient(135deg,rgba(251,191,36,.18) 0%,rgba(245,158,11,.10) 100%);
  border:1px solid rgba(251,191,36,.32);color:#fef3c7;
  transition:transform .15s,box-shadow .2s,border-color .2s,background .2s;
  white-space:nowrap;
}
.ad-btn:hover{
  transform:translateY(-1px);
  border-color:#FBBF24;color:#fff;
  background:linear-gradient(135deg,rgba(251,191,36,.32) 0%,rgba(245,158,11,.20) 100%);
  box-shadow:0 4px 14px rgba(251,191,36,.22),inset 0 1px 0 rgba(255,255,255,.08);
}
.ad-btn:active{transform:translateY(0);box-shadow:0 1px 4px rgba(0,0,0,.4)}
.ad-btn-icon{padding:6px 8px;font-size:13px}
.ad-btn[disabled]{opacity:.45;cursor:not-allowed;transform:none!important}

/* Popover — anchored under the clicked card. Searchable model list with
   memory-safe indicator (red badge on models too big for the user's RAM). */
.ad-popover{
  position:absolute;z-index:50;left:10px;right:10px;top:calc(100% + 4px);
  max-height:320px;overflow:hidden;display:flex;flex-direction:column;
  background:linear-gradient(180deg,rgba(20,15,6,.98) 0%,rgba(8,6,4,.99) 100%);
  border:1px solid rgba(251,191,36,.45);border-radius:12px;
  box-shadow:0 16px 50px rgba(0,0,0,.7),0 0 30px rgba(251,191,36,.18),inset 0 1px 0 rgba(255,255,255,.05);
  animation:popIn .22s cubic-bezier(.16,1,.3,1);
}
@keyframes popIn{from{opacity:0;transform:translateY(-4px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}
.ad-popover-head{
  display:flex;align-items:center;gap:8px;padding:10px 12px 8px;
  border-bottom:1px solid rgba(251,191,36,.18);
}
.ad-popover-head .ph-emoji{font-size:18px}
.ad-popover-head .ph-text{flex:1 1 auto;min-width:0}
.ad-popover-head .ph-name{font-size:13px;font-weight:700;color:#fef3c7}
.ad-popover-head .ph-role{font-size:10.5px;color:rgba(251,191,36,.65);margin-top:1px}
.ad-popover-head .ph-close{
  background:transparent;border:none;color:rgba(251,191,36,.65);font-size:18px;
  cursor:pointer;padding:0 4px;line-height:1;border-radius:6px;
}
.ad-popover-head .ph-close:hover{color:#FBBF24;background:rgba(251,191,36,.1)}
.ad-popover-search{
  margin:8px 12px 4px;padding:6px 10px;
  background:rgba(8,6,4,.6);border:1px solid rgba(251,191,36,.22);border-radius:8px;
  color:#fef3c7;font-size:12px;font-family:'SF Mono',monospace;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.ad-popover-search:focus{border-color:#FBBF24;box-shadow:0 0 0 2px rgba(251,191,36,.18)}
.ad-popover-search::placeholder{color:rgba(251,191,36,.4)}
.ad-popover-list{flex:1 1 auto;overflow-y:auto;padding:4px;scrollbar-width:thin;scrollbar-color:rgba(251,191,36,.25) transparent}
.ad-popover-list::-webkit-scrollbar{width:6px}
.ad-popover-list::-webkit-scrollbar-thumb{background:rgba(251,191,36,.25);border-radius:3px}
.ad-mopt{
  display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;
  cursor:pointer;color:#fef3c7;font-size:12px;
  transition:background .15s;
}
.ad-mopt:hover{background:rgba(251,191,36,.12)}

/* Syntax Highlighting (lightweight) */
/* v2.89.111 — 신택스 하이라이터 재작성. 이전 버전 두 가지 사고:
   1) esc()는 \n을 <br>로 변환 → 라인 주석 regex `[^\n]*`가 전체 코드를 먹음
   2) 주석 wrap 후 `<span class="cm">`의 'class' 단어가 키워드 regex에 다시 매칭 →
      `<span <span class="kw">class</span>="cm">` 같은 이중 wrap → 깨진 HTML 출력.
   해결: \n 보존하는 escSafe 사용 + 주석/문자열은 슬롯에 stash해서 후속 regex 보호. */
function _escSafe(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function highlight(code,lang){
  /* 비코드 언어(markdown·text·report)는 하이라이팅 안 함 — 키워드 매칭이 오히려 노이즈 */
  const safeLang = (lang||'').toLowerCase().trim();
  const isProgLang = !!safeLang && !/^(text|md|markdown|plain|log|diff|none|code)$/.test(safeLang);
  let h = _escSafe(code);
  if (!isProgLang) return h;
  /* 주석·문자열 우선 추출 → 슬롯에 stash. 후속 regex가 슬롯 placeholder를
     건드리지 않도록 \x00N\x00 형식으로. */
  const slots = [];
  const stash = (html) => { slots.push(html); return '\x00'+(slots.length-1)+'\x01'; };
  h = h.replace(/(&quot;[^&\n]*?&quot;|&#39;[^&\n]*?&#39;)/g, m => stash('<span class="str">'+m+'</span>'));
  h = h.replace(/(\/\/[^\n]*)/g, m => stash('<span class="cm">'+m+'</span>'));
  h = h.replace(/(#[^\n]*)/g, m => stash('<span class="cm">'+m+'</span>'));
  h = h.replace(/(\/\*[\s\S]*?\*\/)/g, m => stash('<span class="cm">'+m+'</span>'));
  /* 키워드·숫자·타입은 슬롯 보호된 텍스트에만 적용 */
  h = h.replace(/\b(function|const|let|var|return|if|else|for|while|class|import|export|from|default|async|await|try|catch|throw|new|this|def|self|print|lambda|yield|with|as|raise|except|finally)\b/g,'<span class="kw">$1</span>');
  h = h.replace(/\b(\d+\.?\d*)\b/g,'<span class="num">$1</span>');
  h = h.replace(/\b(True|False|None|true|false|null|undefined|NaN)\b/g,'<span class="num">$1</span>');
  h = h.replace(/\b(String|Number|Boolean|Array|Object|Map|Set|Promise|void|int|float|str|list|dict|tuple)\b/g,'<span class="type">$1</span>');
  h = h.replace(/([=!+*/%|&^~?:-]+)/g,'<span class="op">$1</span>');
  /* 슬롯 복원 */
  h = h.replace(/\x00(\d+)\x01/g, (_, i) => slots[parseInt(i,10)] || '');
  return h;
}

/* Clipboard Paste (Ctrl+V images) */
input.addEventListener('paste',(e)=>{
  const items=e.clipboardData&&e.clipboardData.items;
  if(!items)return;
  for(const item of items){
    if(item.type.startsWith('image/')){
      e.preventDefault();
      const file=item.getAsFile();
      if(!file)return;
      const reader=new FileReader();
      reader.onload=()=>{
        const base64=reader.result.split(',')[1];
        pendingFiles.push({name:'clipboard-image.png',type:file.type,data:base64});
        renderPreview();
      };
      reader.readAsDataURL(file);
      return;
    }

/* v2.89.53 — full markdown 렌더링. 이전엔 코드·볼드·링크만 다뤘고 ###/>/리스트/표는
   raw text로 남아 "### 텍스트", "> 텍스트", "| | |" 그대로 보였음. 사용자
   리포트 깨짐. 이제 헤딩·블록인용·리스트·표·구분선·이탤릭까지 처리. */
function fmt(t){
  if(t.lastIndexOf('<create_file') > t.lastIndexOf('</create_file>')) t += '</create_file>';
  if(t.lastIndexOf('<edit_file') > t.lastIndexOf('</edit_file>')) t += '</edit_file>';
  if(t.lastIndexOf('<run_command') > t.lastIndexOf('</run_command>')) t += '</run_command>';
  if((t.match(/```/g)||[]).length % 2 !== 0) t += '\n```';

  const blocks = [];
  function pushB(h){ blocks.push(h); return '__B' + (blocks.length-1) + '__'; }
  t=t.replace(/<create_file\s+path="([^"]+)">([\s\S]*?)<\/create_file>/g,(_,p,c)=>pushB('<div class="file-badge">📁 '+esc(p)+' — 자동 생성됨</div><div class="code-wrap"><pre><code>'+esc(c)+'</code></pre><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>'));
  t=t.replace(/<edit_file\s+path="([^"]+)">([\s\S]*?)<\/edit_file>/g,(_,p,c)=>pushB('<div class="edit-badge">✏️ '+esc(p)+' — 편집됨</div><div class="code-wrap"><pre><code>'+esc(c)+'</code></pre><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>'));
  t=t.replace(/<run_command>([\s\S]*?)<\/run_command>/g,(_,c)=>pushB('<div class="cmd-badge">▶ '+esc(c)+'</div>'));
  t=t.replace(/```(\w*)\n([\s\S]*?)```/g,(_,lang,c)=>{const l=lang||'code';return pushB('<div class="code-wrap"><span class="code-lang">'+esc(l)+'</span><pre><code>'+highlight(c,l)+'</code></pre><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>');});
  t=t.replace(/`([^`]+)`/g,(_,c)=>pushB('<code>'+esc(c)+'</code>'));

  /* 표(table) 처리 — 코드 블록 placeholder 다음, escape 전에. 라인 매칭이라 단일 패스로. */
  const tableRows = [];
  function pushTable(html){ tableRows.push(html); return '__T' + (tableRows.length-1) + '__'; }
  const lines = t.split('\n');
  const out = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    /* 표 시작: |...|...|  다음 줄에 |---|---|---| 또는 비슷한 구분자 */
    if (/^\s*\|.+\|\s*$/.test(line) && i+1 < lines.length && /^\s*\|[\s:|-]+\|\s*$/.test(lines[i+1])) {
      const headerCells = line.trim().slice(1, -1).split('|').map(c => c.trim());
      i += 2;
      const bodyRows = [];
      while (i < lines.length && /^\s*\|.+\|\s*$/.test(lines[i])) {
        bodyRows.push(lines[i].trim().slice(1, -1).split('|').map(c => c.trim()));
        i++;
      }
      let html = '<table class="chat-table"><thead><tr>';
      for (const h of headerCells) html += '<th>' + esc(h) + '</th>';
      html += '</tr></thead><tbody>';
      for (const row of bodyRows) {
        html += '<tr>';
        for (const c of row) html += '<td>' + esc(c) + '</td>';
        html += '</tr>';
      }
      html += '</tbody></table>';
      out.push(pushTable(html));
      continue;
    }
    out.push(line);
    i++;
  }
  t = out.join('\n');

  /* v2.89.54 — esc()는 innerText↔innerHTML 라운드트립이라 \n을 <br>로 바꿈. 그러면
     multiline regex(/^##/m)가 깨짐. 수동 escape로 줄바꿈 보존. */
  t=t.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  /* 헤딩 — ### / ## / # (긴 것 먼저). esc 후에 처리하므로 # 그대로 매칭됨. */
  t=t.replace(/^###\s+(.+)$/gm, '<h3 class="chat-h3">$1</h3>');
  t=t.replace(/^##\s+(.+)$/gm, '<h2 class="chat-h2">$1</h2>');
  t=t.replace(/^#\s+(.+)$/gm, '<h1 class="chat-h1">$1</h1>');
  /* 블록인용 — 연속된 > 라인 묶기 */
  t=t.replace(/(^&gt;.*(?:\n&gt;.*)*)/gm, m => {
    const inner = m.split('\n').map(l => l.replace(/^&gt;\s?/, '')).join('<br/>');
    return '<blockquote class="chat-bq">' + inner + '</blockquote>';
  });
  /* 수평선 ━━━ 또는 --- */
  t=t.replace(/^(?:━{3,}|-{3,}|={3,})\s*$/gm, '<hr class="chat-hr"/>');
  /* 순서 없는 리스트 */
  t=t.replace(/(^[-*]\s+.+(?:\n[-*]\s+.+)*)/gm, m => {
    const items = m.split('\n').map(l => l.replace(/^[-*]\s+/, '')).filter(Boolean);
    return '<ul class="chat-ul">' + items.map(it => '<li>'+it+'</li>').join('') + '</ul>';
  });
  /* 순서 있는 리스트 */
  t=t.replace(/(^\d+\.\s+.+(?:\n\d+\.\s+.+)*)/gm, m => {
    const items = m.split('\n').map(l => l.replace(/^\d+\.\s+/, '')).filter(Boolean);
    return '<ol class="chat-ol">' + items.map(it => '<li>'+it+'</li>').join('') + '</ol>';
  });
  /* 굵게·이탤릭·링크 — 텍스트 변형 */
  t=t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/(?<![*\w])_([^_\n]+)_(?!\w)/g, '<em>$1</em>');
  t=t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  /* 표·코드 placeholder 복원 */
  t=t.replace(/__T(\d+)__/g, (_,i)=>tableRows[i]);
  t=t.replace(/__B(\d+)__/g, (_,i)=>blocks[i]);
  /* v2.89.57 — newline을 br로 변환. 블록 요소(h1-h6, blockquote, ul, ol, table, hr, div) 직전·
     직후 newline은 자체 margin으로 흡수되도록 제거 (이중 spacing 방지). 이전 버전은 닫는 태그
     직후만 처리해서 리스트 안의 newline이 br로 잘못 변환되던 문제 수정. */
  t=t.replace(/\n+(?=<(?:h[1-6]|blockquote|ul|ol|table|hr|div)[\s>])/gi, '');
  t=t.replace(/(<\/(?:h[1-6]|blockquote|ul|ol|table|div)>|<hr[^>]*\/?>)\n+/gi, '$1');
  /* 리스트·표 안의 줄바꿈은 br로 만들지 말고 제거 (각 li/tr/td는 이미 자체 줄) */
  t=t.replace(/(<(?:ul|ol|table|tbody|thead|tr)[^>]*>)\s*\n+/gi, '$1');
  t=t.replace(/\n+(?=<\/(?:ul|ol|table|tbody|thead|tr|li|td|th)>)/gi, '');
  t=t.replace(/\n/g, '<br/>');
  return t;
}

/* v2.89.99 — 멀티 단계 매트릭스 로더. 단계별로 터미널 스타일 마커가

function showLoader(){

      '<div class="ml-steps" id="mlSteps">'+stepsHtml+'</div>'+
      '<div class="ml-bar"><div class="ml-bar-fill" id="mlBarFill"></div></div>'+
      '<div class="ml-meta"><span>OFFLINE · LOCAL LLM</span><span class="ml-meta-elapsed" id="mlElapsed">0s</span></div>'+
    '</div>';
  chat.appendChild(loader);scrollChatToBottomIfNear();thinkingBar.classList.add('active');
  /* 단계 전환 + 막대 채움. 마지막 단계는 LLM 토큰이 실제로 들어오기 시작할 때까지
     활성 유지 → 토큰 도착하면 hideLoader가 정리. */
  let phase=0;

  const stepsEl=loader.querySelector('#mlSteps');
  const barEl=loader.querySelector('#mlBarFill');
  const elapsedEl=loader.querySelector('#mlElapsed');
  const setPhase=(p)=>{

    items.forEach((el,i)=>{
      el.classList.remove('done','active','pending');
      const mark=el.querySelector('.ml-mark');
      if(i<p){ el.classList.add('done'); if(mark) mark.textContent='✓'; }
      else if(i===p){ el.classList.add('active'); if(mark) mark.textContent='▸'; }
      else { el.classList.add('pending'); if(mark) mark.textContent='◌'; }
    });

  _loaderTimer=setInterval(()=>{
    phase=Math.min(phase+1,_currentLoadingPhases().length-1);

  },500);
}
function hideLoader(){

function _formatRelativeTime(iso){
  try {
    const t = new Date(iso).getTime();
    const diff = Date.now() - t;
    const m = Math.floor(diff / 60000);
    if (m < 1) return '방금';
    if (m < 60) return m + '분 전';
    const h = Math.floor(m / 60);
    if (h < 24) return h + '시간 전';
    const d = Math.floor(h / 24);
    if (d < 7) return d + '일 전';
    return new Date(iso).toLocaleDateString('ko-KR', { month:'numeric', day:'numeric' });
  } catch { return ''; }
}

}
function _filterSessions(sessions){

  const q = _sessionsFilter;

}
function _timeBucket(iso){
  /* Today / Yesterday / 지난 7일 / 지난 30일 / 더 오래 */
  try {
    const t = new Date(iso); const now = new Date();
    const startOfDay = (d)=>new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();
    const today = startOfDay(now);
    const dayMs = 86400000;
    const tStart = startOfDay(t);
    if (tStart === today) return { key:'today', label:'오늘', order:0 };
    if (tStart === today - dayMs) return { key:'yesterday', label:'어제', order:1 };
    if (tStart >= today - 6*dayMs) return { key:'week', label:'지난 7일', order:2 };
    if (tStart >= today - 29*dayMs) return { key:'month', label:'지난 30일', order:3 };
    return { key:'older', label:'더 오래', order:4 };
  } catch { return { key:'older', label:'더 오래', order:4 }; }
}

function _renderProjectGroups(sessions){
  /* 현재 프로젝트가 가장 위, 그 다음 다른 프로젝트들 (최근 활동 순). 각 프로젝트 안에서
     시간 bucket으로 추가 그룹화. */
  const byWs = new Map();
  for (const s of sessions) {
    const key = s.workspace || '';
    if (!byWs.has(key)) byWs.set(key, { workspace: key, workspaceName: s.workspaceName || '워크스페이스 없음', items: [] });
    byWs.get(key).items.push(s);
  }
  const groups = Array.from(byWs.values());
  groups.sort((a, b) => {
    /* 현재 워크스페이스 최우선 */
    if (a.workspace === _sessionsCurrentWs) return -1;
    if (b.workspace === _sessionsCurrentWs) return 1;
    /* 그 다음 가장 최근 업데이트된 워크스페이스 순 */
    const ta = a.items[0]?.updatedAt || a.items[0]?.createdAt || '';
    const tb = b.items[0]?.updatedAt || b.items[0]?.createdAt || '';
    return tb.localeCompare(ta);
  });
  return groups.map(g => {
    const isCurrent = (g.workspace === _sessionsCurrentWs);
    const headLabel = (isCurrent ? '▸ ' : '') + (g.workspaceName || '워크스페이스 없음');
    const headBadge = '<span class="sessions-group-count">'+g.items.length+'</span>';
    const head = '<div class="sessions-group-head'+(isCurrent ? ' current' : '')+'"><span class="sgh-icon">'+(isCurrent ? '📂' : '📁')+'</span><span class="sgh-label">'+_escapeHtml(headLabel)+'</span>'+headBadge+'<span class="sgh-toggle">▾</span></div>';
    /* 안에서 시간 bucket 그룹화 */
    const buckets = _bucketByTime(g.items);
    const bucketsHtml = buckets.map(b =>
      '<div class="sessions-time-bucket"><div class="sessions-time-label">'+b.label+'</div>' +
      b.items.map(_sessionRowHtml).join('') +
      '</div>'
    ).join('');
    return '<div class="sessions-group'+(isCurrent ? ' current' : '')+'">'+head+'<div class="sessions-group-body">'+bucketsHtml+'</div></div>';
  }).join('');
}
function _renderTimeGroups(sessions){
  /* 워크스페이스 무시, 시간만 */
  const buckets = _bucketByTime(sessions);
  return buckets.map(b =>
    '<div class="sessions-group"><div class="sessions-group-head"><span class="sgh-icon">⏱</span><span class="sgh-label">'+b.label+'</span><span class="sessions-group-count">'+b.items.length+'</span></div>' +
    '<div class="sessions-group-body">' + b.items.map(_sessionRowHtml).join('') + '</div></div>'
  ).join('');
}
function _bucketByTime(sessions){
  const map = new Map();
  for (const s of sessions) {
    const b = _timeBucket(s.updatedAt || s.createdAt);
    if (!map.has(b.key)) map.set(b.key, { ...b, items: [] });
    map.get(b.key).items.push(s);
  }
  const arr = Array.from(map.values());
  arr.sort((a, b) => a.order - b.order);
  return arr;
}
